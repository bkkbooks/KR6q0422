body:
  text: 嗣法門人智恒等編住霍丘大別山普濟禪寺語錄師在陽山受請於順治七年庚寅十月八日進院至山門以拄杖指云我此法門廣大甚深不入而入水赴雲奔且道向上關捩子在甚麼處拽拄杖便入佛殿云三身四智八解六通若喚作佛笑殺渠儂畢竟如何撒開坐具云若向這裏親薦得佛功德海讚無窮大展三拜方丈據座云釋迦掩室於摩竭提國抱薪救焚維摩杜口於毘耶離城喫鹽止渴新普濟這裏平如鏡面峻若嶮崖顧杼停機欄腮劈脊且道為人在甚麼處喝一喝卓一卓便起即日霍丘固始兩郡緇素檀那請開堂拈疏云靈山奧旨少室真宗一一顯露分明須知盡從這裏流出如其會得不消重說偈言脫或未委輒煩表白重為宣讀宣畢指法座云此名寶華王座先聖據之說黃道白指東畫西惑亂人未有了日即今變作一塊良田喜上座便乃披毛戴角拖犁拽耙於中耕雲種月去也還見麼便陞拈香云此一瓣香端為支那帝主北闕至尊爇向爐中祝延聖躬萬安恭願心燈了了而常光佛日慧炬煌煌而永燭堯天次拈云此一瓣香奉為滿朝文武天下官僚伏願永作皇家之柱石恒為佛法之金湯并及當山請主護法檀那列剎耆舊現前大眾世世不忘般若之真因生生徹證金剛之種智又拈云此一瓣香混融三際含裹十虛二十年撥艸瞻風後到天台峰頂禮見箇不近人情老尊宿直與一鎚擊碎因茲痛恨難忘今對人天眾前拈出奉為現住浙江寧波府天童堂上傳臨濟正宗第三十一代本師林野大和尚爇向爐中用酬法乳之恩斂衣就座陽山慧大師白椎云法筵龍象眾當觀第一義師云單提向上巴鼻凡聖莫測其源而況第一義空向甚麼處著眼如有解觀者不妨眨上眉毛出來相見問世尊陞座文殊白椎世尊下座未審說何法師云普濟岩前奔大壑安陽頂上翫長空進云祖師西來當為何事師云只為汝鼻孔不正進云來後如何師打云向這裏薦取進云和尚在這裏作麼生師云當面蹉過問一朝權在手便把令來行如何是普濟正令師云放汝三十棒進云恁麼四大部洲皆仰望十方圍繞法中王師云少汝一箇不得僧禮拜師便打前僧復問大海有珠誰人取得師云問了話又問話進云一切諸法本來是有那箇是無師豎起拄杖云且道這是有是無僧便喝師便打進云明眼人難瞞師云瞎進云和尚又作麼生師云瞎瞎乃云萬里晴空一天杲日在處漁樵鼓舞隨方物類欣歡正是般若流通之際舉揚正法之時就裏四句百非當頭坐斷迥絕淆訛正眼洞明十方寥廓淨裸裸脫情塵赤灑灑無向背恁麼也得不恁麼也得天高群象正恁麼不恁麼總得海闊百川朝然雖如是且今日人天普集選佛場開真俗和同主賓契合一句又作麼生道良久云還委悉麼兩輪日月光昭遠萬古乾坤覆載隆謝詞不錄復舉寶壽開堂日三聖推出一僧壽便打聖云恁麼為人瞎卻鎮州一城人眼去在壽擲下拄杖歸方丈師云這二大老一挨一拶一抑一揚可謂揭示當人正法眼藏發揮從上佛祖家風若或放過則彼此作家簡點將來猶欠一著山僧今日開堂或有推出一僧便乃一并打出法堂不惟使他直下知恩貴與人天作箇眼目卓拄杖一下白椎云諦觀法王法法王法如是下座當晚小參驀拈拄杖卓一卓云無孔銕鎚覿面拋神驚魔伏鬼哮啕庭前露柱纔偷覷萬象森羅已痛遭所以道若論此事如擊石火似閃電光搆得搆不得俱未免喪身失命雖然如是且轉身吐氣一句又作麼生道到頭霜夜月任運落前溪開爐小參結卻袋口收拾闌殘三條椽下七尺單前不容學道豈許參禪饑餐渴飲閒坐困眠風頭稍硬爐火禦寒隨緣自在放曠翛然是即是驀豎拂子云秪如這箇喚作拂子則觸不喚作拂子則背不觸不背畢竟喚作甚麼良久云覿面相呈如不會且從放待冷來看擲拂子下座開爐上堂寒則普天匝地寒熱則普天匝地熱雖則寒暑遷流當體本無生滅是以丹霞燒木佛燎卻院主鬚眉移花兼蝶至百丈躬身撥火突出溈山眼睛買石得雲饒山僧今將盡十方世界為一火爐以四聖六凡作柴炭遂拈拂子吹一吹云秪憑這星子三昧火猛發烈焰亙天不容進前退後卓立躊躇汝等諸人作麼生得箇出身之路以左手拍禪床復舉趙州示眾云我向南方行腳火爐頭有箇無賓主句直至如今無人舉著師乃召大眾云還會麼若會得趙州老漢無地容身其或未然不免重下註腳我向行腳南方火爐頭有箇無賓主句也是貧兒思舊債直至如今無人舉著切忌揚聲止響普濟恁麼批判還有為趙州作主底麼晚參加工益行枉興兔角之樊籠絕學無為徒解龜毛之繫縛赤身擔荷早涉程途脫體承當翻成鈍置大別山高芙蓉山低猶落時人窠臼直須放出溈山水牯觸殺臨濟瞎驢方能經天緯地玉轉珠回何故無滯自然隨水去有聲多為不平來示眾舉趙州云若從南方來者我這裏為伊下載若從北方來者我這裏為伊上載師云山僧即不然若從南方來者普濟為伊上載若從北方來者普濟為伊下載因甚如此不見道多處添些子少處減些子上堂舉忠國師因丹霞來參纔展坐具國師云不用不用霞退後三步國師云如是如是霞進前三步國師云不是不是霞繞禪床一匝出去國師云去聖時遙人多懈怠三十年後求箇漢也難得師云諸方盡謂此二老有六韜三略之才具武緯文經之作仔細簡點將來總沒交涉殊不知丹霞被國師舌頭謾國師隨丹霞腳跟轉若到普濟這裏各與三十拄杖何故蚌鷸相持俱落漁人之手上堂破糞箕禿苕帚臥月眠雲乾屎橛死貓頭超今越古恁麼舉唱是汝諸人還簡點得出麼如簡點得出山僧生陷無間地獄脫或未然雪峰輥毬玄沙汝虎復舉修山主云是柱不見柱非柱不見柱是非已去了是非裏薦取師云釣魚放生下座師一日牽一頭驢上堂示眾云即今有箇現成公案拈來問汝諸人若道得一轉語與山僧相契拄杖拂子兩手分付遂抬腳云我腳何似驢腳復舉手云我手何似佛手又云人人有箇生緣上座生緣在甚麼處眾下語皆不契師代我腳何似驢腳處云但禮拜師代我手何似佛手處但禮拜師代上座生緣在甚麼處便騎驢去喫艸更與頌出頌云我手何似佛手展縮拈提本有庭前露柱呵呵蟭螟吞卻北斗我腳何似驢腳玄沙嶺頭築著纔方擬議思量鷂子新羅已過人人有箇生緣晨昏舉止茫然不是將心特地秪因要喫要穿復云錯錯冬至小參云日往月來光陰何倏忽炎涼寒暑節令不相饒時逢道啟元陽景開南路魯臺書五雲之篆漢殿添一線之長石霜揭榜文於堂上爻象分明洞山掇果桌於筵中彖辭難決普濟也要應箇時節以拂子作圓相復擊禪床云將楊岐金剛圈栗棘蓬一并拈出汝諸人還吞跳得麼若吞跳得不妨群陰剝盡若吞跳不得依舊一陽復生乃舉僧問古德如何是冬來意德云京師出大黃師云古德雖有風馳電卷之威石裂岩崩之作要且不能使這僧點首今夜或有問如何是冬來意山僧只向伊道印破虛空千丈月洗清天地一林霜晚參僧問普濟家風即不問如何是春來景師云沙暖睡鴛鴦進云恁麼則日月光天德山河壯帝居去也師云非公境界乃舉大慈示眾云說得一丈不如行取一尺說得一尺不如行取一寸洞山云說取行不得底行取說不得底雲居云行時無說路說時無行路不說不行時合行甚麼路洛浦云行說俱到即本分事無行說俱不到即本分事在師拈云這幾尊宿雖則各明本地風光共指當人要路若據本分事俱未夢見在普濟見處也要諸人共知饑時餐渴時飲閒時坐困時眠且道是何意旨雲在嶺頭閒不徹水流澗底太忙生佛成道日上堂拈拄杖云釋迦世尊睹明星而悟只悟得這箇復卓一卓云眾生處塵勞而迷只迷得這箇拈卻迷悟兩頭坐斷凡聖窠臼直得上無攀仰下絕己躬淨裸裸赤灑灑無得無失無是無非驀呈拄杖云且道這箇是甚麼有時閒把出門去扶我歸來靠壁東下座晚參舉黃檗禪師一日在鹽官佛殿上禮拜次時唐宣宗為沙彌乃問云不著佛求不著法求不著僧求長老禮拜當何所求檗云不著佛求不著法求不著僧求常禮如是事彌云用禮何為檗便掌彌云大麤生檗云這裏是甚麼所在說麤說細隨後復掌沙彌便走師拈云黃檗禪師雖則臨機大用現前覿面全提迥絕且不知鼻孔落在大唐天子手裏何故聻陣雲橫海上拔劍攪龍門示眾吾遠祖會和尚初住楊岐老屋敗椽僅蔽風雨適臨冬莫雪霰滿床居處不遑衲子投誠願充修造會祖卻之曰我佛有言時當減劫高岸深谷遷變不常安得圓滿如意自求稱足汝輩出家學道整頓手腳未穩已是四五十歲矣詎有閒工夫事豐屋耶竟不從翌日上堂云楊岐乍住屋壁疏滿床盡撒雪珍珠縮卻項暗嗟吁翻億古人樹下居先德恁麼可謂不以飽煖適意切將此道為尊山僧方住普濟破院料理未妥夜來遭一陣猛風盡底掀翻亦成一偈拈來普示大眾乃云別山方住半餘年收拾茅廬尚未安忽被狂風俱捲卻禪床欹枕見青天寬著肚謾隨緣逆順安危總一般上堂舉玄沙示眾云諸方盡道接物利生忽遇三種病人來且作麼生接患盲者拈椎豎拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得且作麼生接若接不得佛法無靈驗當時地藏出云某甲有眼耳和尚作麼生接沙云慚愧便歸方丈後有僧請益雲門門云汝禮拜著僧拜起門以拄杖挃之僧乃退後門云汝不是患盲復喚近前來僧纔近前門云汝不是患聾門云還會麼僧云不會門云汝不是患啞其僧有省師拈云玄沙夜半潑墨地藏日午挑燈雲門好肉上剜瘡三人各自擔板山僧今日露箇消息也要諸人檢責遂豎起拂子云若向這裏薦得即瞎卻你眼復擊禪床云若向這裏薦得即聾卻你耳若道總不恁麼即啞卻你口到這裏也須眼裏有筋皮下有血始得還會麼鶯囀上林花滿地客遊三月艸侵天下座晚參舉座主問白馬曇禪師祖意教意是同是別曇云如車二輪如鳥兩翼主云將謂禪門有奇特元來不出教乘遂回後聞夾山盛化遣小師馳問前語夾山曰鏤冰無琢玉之談結艸乖道人之意小師回舉似主主乃讚嘆遙禮曰將謂禪門與教意不殊元來有奇特事師召大眾云二老恁麼荅話且道是同是別若同鏤冰無琢玉之談若別結艸乖道人之意畢竟如何乃豎拂子云還會麼一把柳絲收不得和煙搭在玉欄杆化城菴見堂怨禪德病請上堂問如何是奪人不奪境師云你似一頭驢進云如何是奪境不奪人師云騎佛殿出山門進云如何是人境俱不奪師云薰風自南來殿閣生微涼進云如何是人境兩不奪師云片雲橫谷口歸鳥悉迷巢進云有意氣時添意氣不風流處也風流師云且緩緩著僧便喝師便打僧禮拜師驀拈拄杖云提起金剛寶劍直下不徇人情遂卓一卓云劈破三玄三要放出無位真人便乃手之舞之足之蹈之欣欣然而說偈曰不思議解脫力妙用恒沙也無極四事供養敢辭勞萬兩黃金亦消得粉骨碎身未足酬一句了然超百億遂召大眾云且道是那一句還會麼庭前之古柏微微濕露嶺上之白雲澹澹拖風若向這裏薦得不妨蹋破化城親登實所脫或未然當堂無影跡遍界不曾藏以拄杖卓一卓喝一喝復舉僧問曹山學人通身是病請師醫山云不醫僧云為甚麼不醫山云教汝求生不得求死不得師云這僧正患入髓之沉痾若不遇曹山老漢殆乎危矣何足救哉雖然如是曹山只具診候之手而無瘥病之方即今忽有問山僧學人通身有病請師醫山僧劈脊便棒何謂如此不見道若藥不瞑眩厥疾不瘳下座上元立春解制上堂十五日以前人人頭上頂青天十五日以後目前法法皆仍舊正當十五日夜月燈光燦虛碧鑼聲戛戛鼓喧騰村歌社舞快無極風流公子可憐生翫賞佳人多啞啞張公醉倒在街頭元是李公貪酒喫林下道人復若何摩訶般若波羅蜜普濟恁麼告報鼓動僧堂裏憍陳如尊者邀劉郎先生倒騎石虎向四大部洲共賞元宵一匝歸來手舞足蹈打箇觔斗走入三艸二木去也乃召大眾云且道他二人有甚麼長處得恁麼無礙自在還會麼驀豎拂子云慇懃為解丁香結放出枝頭自在春佛誕日上堂性海汪洋眾德以茲繫廣真空窅寞多門由是圓融契凡聖於一源本非得失了死生之莫二何妨去來故我大覺世尊證寂滅體開方便門愍炎宅之既焚傷欲流之永鶩遂爾離諸兜率誕跡迦維運無作之神通度有情之含識正所謂淨法界身本無出沒大悲願力示現受生雖然如是且道釋迦老子即今在甚麼處驀拈拄杖云來也來也向山僧拄杖頭上誕生現瑞是汝諸人還見麼復卓一卓云將正法眼藏涅槃妙心實相無相秘密法門直截吐露了也還聞麼如其見處分明聞處透脫便能塞乎天地耀古騰今脫或未然乃擲下拄杖云大眾普同到佛殿上香念誦中秋日過霍丘福昌寺眾請陞座平白地上拈起一絲毫頭盡大地人亡鋒結舌未審利害在甚麼處眾中莫有知委者麼不妨出來道看僧問日往月來即不問中秋佳節時如何師云當軒月正圓進云恁麼則人人且慶中秋節家家齊唱太平歌師云切忌瞻望僧擬議師云這鈍漢僧禮拜師乃云秋風清秋月明秋雲淡蕩秋水澄渟歷祖示為向上巴鼻諸佛演作妙淨明心山僧直截指似未審諸人惺不惺急薦取莫沉吟庭前秋色數株翠額上眉毛八字橫復舉僧問雲門禪師云樹彫葉落時如何門云體露金風師云雲門老漢雖則手親眼辨善赴來機仔細簡點將來猶欠一著在山僧今日忽有問樹彫葉落時如何只向伊道且隨老木同寒瘠將逐春風入燒瘢此語有兩負門具眼者試辨看擊拂子下座福昌大眾請師開示若論斯事人人具足箇箇圓明本無遮障之緣豈假開示之說蓋為多生以來不覺一念妄動逐於諸塵蕩而忘返故有生死苦海輪迴不息耳即今也無別等玄妙奇特所示只要汝諸人向二六時中四威儀處回光返照於一念未生已前忽然知歸方解念起而無所起眼見而無所見耳聞而無所聞心思而無所思便爾頭頭不昧剎剎圓融山僧如此告報是汝諸人直下還會麼若不會歸堂喫茶處薦得方信不吾欺也晚參舉南泉示眾云王老師自小養一頭水牯牛擬向谿東牧未免犯他國王水艸擬向谿西牧亦未免犯他國王水艸不如隨分納些些總不見得師云南泉老漢大似掩鼻偷香不顧傍觀者哂何故聻夾路桃花風雨後馬蹄無處避殘紅上堂當頭拈出充塞十虛直下知歸了無一事即此打破生死牢關隨緣得用掀翻識情窠臼徹見根源不唯歷歷明明更是綿綿密密所以道乾坤廓落無邊表杲日當天宇宙明赴光山請謝別眾緇素上堂玄機普應妙密無方充滿十虛貫通三際所以道無邊剎境自他不隔於毫端十世古今始終不離於當念然則衲僧境界信意安排是處家山而元無彼此隨緣自在而何妨去來客秋到此高桂缽囊揭下笠子今朝依舊橫擔拄杖緊峭艸鞋行藏離合既各有時用舍窮通俱皆分定向蒙一方緇素盛德資培今者暫應他緣特為登堂致謝然雖如是且接物利生一句作麼生道大別山頭雲出岫為霖蘇亢本無心下座普濟禪寺語錄終雲峨禪師住河南光山縣普福禪院語錄師於順治辛卯中秋二日進院至山門云誰能出不由戶何莫由斯道也但能足下無私便可當陽直入喝一喝佛殿云三二一一二三文殊淈𣸩普賢顢頇釋迦鼻孔皆相似信把檀香一串穿遂上香大展三拜據室云從上祖師向這裏說心說性天下老和尚向這裏舉古舉今新普福又且不然一任佛來祖來凡來聖來各與三十白棒趁出何故斫卻月中桂清光應更多即日陳衡山杜弼直二居士率闔邑檀那請就當山開堂至法座云此座高廣嚴飾不假燈王借來任從上通有頂盡在山僧腳下便陞座拈香祝聖畢又拈云此瓣香前在大別山道破次第二回拈出爇向爐中供養天童堂上本師林野老和尚用酬法乳遂就座維那白椎竟師驀拈拄杖云一竿一笠一輕舟為覓金鱗四海游今到中州垂一釣有能負命快吞鉤以拄杖作釣魚勢云有麼有麼試出來𨁝跳看僧問選佛場開高賢聚會即不問如何得人人悟毘盧性海師云腳不離地走進云如何得箇箇入普賢行門師云文殊與吾攜水去普賢猶未摘花來進云未涉樵子徑已到葛洪家師便打僧禮拜師云香已拈了問荅已畢肯向就中省事各宜珍重而歸脫或未然不免再打葛藤一上謾汝諸人去也乃云格外絕纖塵正體不昧當機無朕跡法爾如然非心非佛而耀古騰今即色即聲而超情離見到這裏一任孤峰絕頂嘯月吟風鬧市紅塵和光混俗便乃放行時把住趁起溈山水牯牛把住時放行拽迴玄沙箇汝虎雖然秪如是非泯盡隱顯全該一句作麼生道良久云野老不知堯舜力鼕鼕打鼓祭江神謝詞不錄復舉三聖云我逢人即出出則不為人興化云我逢人即不出出則便為人師云諸仁者還知二老落處麼一人手長腳短一人面瘦耳肥若有辨別得出正好喫山僧手中痛棒若辨別不出長連床上有粥有飯白椎云諦觀法王法法王法如是下座檀越建方丈畢請師上堂僧問寶鏡當臺即不問斬新條令事若何師云天上有星皆拱北人間無水不朝東進云恁麼則普福堂前添意氣不風光處也風光師云誰人不瞻仰進云大地盡沾恩師云杲日當空照進云謝和尚慈悲便禮拜師便打問昔日長者布金造精藍於袛園現前施主捐貲創方丈於普福且道古今是同是別師云箇箇皆登寶所進云恁麼則財法二施原非二福慧雙修始是修師云三輪空寂進云不言福樹花開早更有心空及第歸師云