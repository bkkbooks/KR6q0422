真云只這老尊慈生緣何殫述示現比丘身無意無必固五坐大名藍於吳東浙西十載據猊床而訶佛罵祖斷衲子之命根兮虎驟龍驤起濟宗之頹綱兮風飛雷怒不肖當年遭毒手而今合笑寧堪哭何以故冷水浸冬瓜秤錘蘸生醋浴佛上堂僧問冒雨衝風去披星戴月回佛法在甚麼處師云有勞闍黎進云忽遇冰清水冷時如何師云通身骨毛寒進云恁麼則百艸頭邊西來意紅塵堆裏佛家風師云眼睛突出乃云即心即佛牛皮鞔露柱非心非佛銕錘被蟲蛀不是心不是佛不是物醋煮須彌山透熟此箇話端遺來多少時也自古至今縱具銅頭銕額天眼龍睛的并無一人奈何他今被山僧一一分明花判了也汝等諸人還會麼若能于此會得始知大道虛玄真機朗映縱橫自在隱顯優游所以世尊初生下時便乃一手指天一手指地週行七步目顧四方云天上天下唯吾獨尊後來雲門大師云我當時若在一棒打殺與狗子喫了貴圖天下太平世尊大似激濁揚清不覺通身泥水雲門雖與指蹤諱跡那知滿面埃塵且道國祥今日又作麼生聻下座煩大眾各與當頭一杓湯直教光前絕後耀古騰今去也喝一喝下座結制示眾參禪徒妄想打坐屈身勞性海微風作覺浪拍天高止息重增病縱之轉飄颻須彌入芥子瓦解與冰消這裏薦得且居門外止宿艸菴若要入室陞堂國祥未敢相許何也靈光不昧萬古徽猷入此門來不存知解驀拈拄杖卓一卓云國祥拄杖子聞之忍俊不禁𨁝跳入諸人八萬四千毛孔裏去也觸著五臟神惡發把毘富那山劈面一摑殃及溈山水牯牛痛徹不已急向新羅國裏藏身進退逡巡欲隱彌露當恁麼時上天無計入地無門因甚如此鼻頭繩索盡在山僧手裏復卓一卓下座結制上堂三春已過九夏方新聖制既爾時臨豈可違條越例直得四來禪眾於國祥山中龍池寺裏腰包丟向一邊芒鞋脫擲門外高掛缽囊拗折拄杖將盡十方剎海收入一毛頭許只這一毛頭許也須及盡了不可得促百千萬劫於一念頃只這一念頃本自無生然後據一大圓覺為我伽藍身心安居平等性智於中行但行坐但坐機來喫飯倦來打眠語默動靜折旋俯仰隨緣自在任運騰騰直教箇箇作一員脫灑衲僧豈不暢快生平者哉遂驀豎拂子云雖然這箇喚作拂子則頭上安頭不喚作拂子即斬頭覓活得失是非一齊拈卻汝等諸人又作麼生會良久云薰風自南來殿閣生微涼擊拂子下座示眾真機絕對待蓋色騎聲大道體周圓隨緣隱顯利似太阿鋒明於秋空月當陽辨的而玉轉珠回句外明宗而經天緯地凈裸裸絕承當赤灑灑無向背直饒恁麼更須坐斷毘盧頂𩕳放出衲僧巴鼻卷舒自在殺活縱橫電光石火猶為鈍滯德山臨濟倒退三千與麼即且置秪如虛空粉碎大地平沉拽取東洋大海與國祥山鬥額又作麼生道待伊心肯處是我命通時舉修山主示眾云具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即是凡夫凡夫若知即是聖人此語具一理二義若人辨得不妨於佛法中有箇入處若辨不得莫道不疑好師拈云修山主雖善作家大似拔貧作富補短裁長國祥即不然若凡若聖若知不知若會不會驀拈拄杖劃一劃云盡向這裏百雜碎了也試問諸人還有修山主說話分也無良久云參差杉檜煙凝薄重疊峰巒月映微咄莫動著動著則打折你驢腰秀水樓真汶和尚至上堂拈拄杖卓一卓喝一喝云一喝分賓主照用一時行擊碎蟠桃核得見箇中人箇中人既已見了更復將何話會昨夜南山虎咬大蟲今朝燈籠吞卻露柱頭頭體用全彰處處了無回互腳踏須彌眼觀四海手提南北意在東西賓則始終賓主則始終主賓主歷然通同合轍弟應兄呼藕穿平地為荷葉瞻前顧後筍過西家作竹林然雖如是且道主賓契合一句作麼生道漆桶相楷成底事空噇空即飽膨脝便下座端午示眾天中節屆夷風從艾虎而飄香地臘時臨靉靆起槐龍而清暑當此之際世上君子切菖蒲以泛酒片片皆金林下道人解黍粽以喫茶顆顆是玉貴乎信手拈來大都受用不盡所以文殊一日令善財採藥云是藥者採將來善財遍觀無不是藥卻來白文殊云無不是藥者殊云是藥者採將來善財遂拈一莖艸度與文殊殊提起示眾云此藥亦能殺人亦能活人文殊直截指陳善財當陽拋出可謂收放縱橫與奪自在如其會得則千妖百怪不遣自化赤口白舌不除自消倘或未然國祥劃一道靈符念一道真言去也遂以拂子劃此相云𭊭𠺗嘛耶悉唎莎訶復卓拄杖云急急如律令敕因事上堂金烏東上月西沉寒暑遷流四序更箇事現成如未瞥可憐虛喪好光陰遂召眾云諸禪德秪如沒溺生死之巨海平陷是非之窠臼不得出頭的過在甚麼處奈緣真心忽昧妄見俄興妙覺因斯而迷淪塵緣由是而日習致使匍匐三界之長途輪迴四生之大苦者蓋為此耳豈不痛哉豈不究哉故永嘉云嗟末法惡時世眾生福薄難調制去聖遠兮邪見深魔強法弱多怨害聞說如來頓教門恨不滅除令瓦碎作在心殃在身不須怨訢更尤人欲得不招無間業莫謗如來正法輪且道如何是正法輪驀豎拂子云還會麼若道這箇是有則為增謗若道是無則為減謗若道非有非無則為戲論謗若道亦有亦無則成相違謗畢竟如何得恰好去青山只解磨今古流水何曾洗是非晚參舉南泉示眾云法身還具四大否有人道得與他一腰褌道吾云性地非空空非性地此是地大三大亦然泉不違前語與褌一腰師云南泉不違前語秪見錐頭利道吾贏得一腰褌不見鑿頭方既然與麼且道法身還具四大否乃撫掌呵呵大笑云侍者記取這話三十年後大行修路小參向上一路千聖不傳學者勞形如猿捉影東西南北元來四闢六通曲直低昂竟絕纖塵隔礙不假修證本自圓成其奈祖庭秋晚法社凌夷心徑荒唐人天迥阻致使平地孤堆嵯峨