迦羅心靈然不昧摩醯正眼光照無窮承般若力而真機普應奮那吒臂以大用全提有權有實或卷或舒無作無為能殺能活便可與人解黏去縛抽釘拔楔流通正眼迥絕羅籠如獅子王奮迅吒沙踞地返擲正所謂法王法力超群生常以法財施一切久積正覺稱無量導眾以寂故咸稽首還會麼莫怪從前多意氣他家曾踏上頭關郟縣應期回眾新戒請上堂僧問郟縣正堂鋪氈結彩請傳千佛大戒歸來風穴上堂未審二處道場是同是別師云戶外風搖竹庭前雪壓梅進云看破了也師云未具眼在僧便喝師云瞎乃拈拄杖卓一卓云打開多寶藏拈出無價珍權施方便門呼為戒定慧洞明心體亙古亙今徹法根源如理如事行之在己秉受從師但了情塵聖凡不二所以道眾生受佛戒即入諸佛位位同大覺已真是諸佛子雖然如是秪如風穴結制於開化傳戒兩處道場是同是別流水下山非有意白雲歸洞本無心下座解制小參結冬九十日內晝夜二六時中語默動靜折旋俯仰喫飯穿衣經行坐臥工夫綿密妄想綢繆仔細究竟將來了無巴鼻行至水窮山盡處做到羅紋結角時驀地回光當頭撞著乃撫禪床云㘞元來在這裏是即是秪如恁麼不恁麼總不得時如何三邊一箭收功後萬里歌謠賀太平解制上堂僧問是法平等無有高下凡聖交參如何辨別師云㾃子相逢著箇中無直人進云佛說一切法為度一切心我無一切心佛法何用師云省力乃云打破情關衲子頂𩕳開正眼放行一路芒鞋腳底動春風兩輪日月杖頭挑去住縱橫沙界闊隨緣得玅任運逍遙雖然如是前程忽有箇不近人情底漢攔腮把住云咄還我風穴九十日落處來又作麼生道眾無語師云莫怪白雲山勢嶮前途猶有最高峰師誕辰眾請上堂僧問如何是諸佛出身處師云春到柳條青進云四路懸巖一林荊棘向甚處措足師云八面玲瓏問善財童子五十三參參箇甚麼師云手執夜明符幾箇知天曉進云未審音信何如師云就路還家問世尊初生手指天地四顧周行今日和尚誕辰又作麼生師云天高有象地厚無垠進云法王座上全身露覿面承當非古今師云切忌道著乃云朕兆未分已前極盡神思難考究混元既剖之後高懸日月轉光輝窅然冠古通今卓爾超情越量萬法演靈源而不昧一真該法界以無涯綿綿密密盡包容物物頭頭皆顯煥不拘動寂體悟無生正所謂在胎為身處世名人在眼曰見在耳曰聞在手執著在足運奔遍現俱該法界收攝在一微塵識者知是佛性不識喚作精魂乃豎拂子云還識這箇麼秪知事逐眼前過不覺老從頭上來佛誕日上堂一鎚便就未為性燥良工三搭不回顧副英靈作者赤手空拳與八大龍王鬥富賣弄家風熊心豹膽餓眼下視於諸方誇張意氣雷轟電卷之機出沒縱橫自適所以釋迦老子纔生下時便乃手指天地四顧周行曰天上天下唯吾獨尊世尊恁麼施設可謂即情塵而打歸自己托境物以指似於人取捨臨時抑揚有準然雖如是且雲門道我當時若見一棒打殺與狗子喫了貴圖天下太平意又作麼生不因紫陌花開早爭得黃鶯下柳條中元日佛岩默云和尚至引座金風蕩暑玉律鳴秋雁唳長空蟬吟古樹屋外園林朝來凝淑氣庭前桐葉日午墜秋光田疇黍穀皆登岩桂含香欲吐碧天似水素月如霜一一絕纖塵頭頭無滲漏當此之際且道喚作心耶境耶喚作時節耶因緣耶到這裏風穴亦不敢動著些兒日昨幸承佛岩和尚到來山中箇箇歡喜無量須知法遇之緣非同小小下座偕兩序頭首率眾同伸拜請惟願不吝慈悲直截道破小參當陽拈出智眼猶迷徹底無私有誰賞鑑僧問風穴家風佛來祖來各與三十棒有何長處師云今日不打你進云山光澹蕩皓月依稀未審是神通玅用法爾如然師云鶴立孤松雪猿啼澗下風進云千聖喚不回頭諸佛迥無巴鼻和尚將甚麼號令人天師云玉箸撐虎口問風穴重整爐鞴四眾雲臻未審如何煆煉師云你是白銕漢乃云蒲團兀坐事事不干懷山寺棲遲心心無著處家風冷澹而煞有生涯雲水相從而甘同寂寞青山聚首叔世良緣莫當等閒光陰可惜遂顧左右召大眾云秪如頭上是天腳下是地耳裏聞聲鼻孔出氣此意人人盡知且道眉毛終日在眼上因甚麼不見參開爐汝州眾鄉紳入山東渤禪德領大梁觀察沈內翰營齋請上堂問高提祖印爐鞴弘開向上一機如何舉唱師云烈燄騰空進云十五日以前鏡中明潔十五日以後眼裏著沙未審淆訛在甚麼處師云眉毛八字橫乃云豁開正法眼藏洞明十虛透脫向上玄關冥通三際理隨事變寒梅漏墻角之小春事得理融汝海涵天邊之皓月卷舒自在今古恒然茲當元英啟侯孟冬謹時碧瓦凝霜千峰寒色方外遊人罷搖金錫林間衲子掛搭開爐著被青州布衫焚燒丹霞木佛說甚南方火爐頭無賓主句惟貴一團和氣大家共守白雲且道不是心不是佛不是物畢竟是箇甚麼良久云失腳踏翻滄海月大千沙界放光明復舉道林禪師至秦望山見一長松盤屈如蓋遂棲止其上號鳥窠焉一日白侍郎入山謁師問云和尚住處甚危險窠云居士危險猶甚白云弟子位鎮江山何險之有窠云晝夜薪火交煎識性不停得非險乎又問如何是佛法大意窠云諸惡莫作眾善奉行白云三歲孩兒也解恁麼道窠云三歲孩兒雖道得八十老翁行不得白作禮而退師拈云揚其湯者莫若撲其火止其流者莫若塞其源侍郎拈出耀眼精金鳥窠大展作家爐鞴可謂懷藏寶鑑遇智者以增輝如斯會得便見善惡無根真俗不二苟或未然更與頌出良哉因地有靈根腰佩黃金叩上乘善惡兩頭俱剔脫孔門日月照乾坤下座上堂問酬天地之深恩報父母之盛德未審恩德作麼生酬報師云無明山上作雲雷問青山常舉足緣水轉無流時如何師云八臂那吒輥繡毬進云意旨如何師云念念不停乃云茲因雲臺魏居士弟兄得得來山盥沐焚香延請風穴闔堂清眾啟建七佛道場營辦香饈供養十方賢聖乃復殷勤敦請山僧陞於此座舉揚正法為眾結般若之緣專為堂上萱慈植福修因山僧不辭牽枝引蔓向錦上鋪花去也良久云還會麼大智圓明光通今古靈源玅湛澤及群生堅似金剛而不磨寬若太虛而無盡重重福德門種種壽量海隨時應物觸處現成動止恒然了無作意不是神通玅用亦非法爾如狀乃是當人從無量劫來本自具足一段大受用境界契券分明直饒諸佛出世各各放大寶光也則侵占他一星兒不得唯貴直下一念回光親證毘盧藏海然雖如是且道承誰恩力便與麼鄭重但得心空多快樂經行步步踏青蓮下座太湖竺文侍者同紫峰陝西回請上堂問自入長安風味別歸來仍住舊家山且道成得甚麼邊事師云芒鞋腳底活如龍進云恁麼則重沐和尚恩光去也師云照天照地進云不得錯舉師云已遍天下僧喝師便打問眼見耳聞未起分別時如何師云青山常突兀進云了了常知非內外如何進步師云眼見耳聞問絕塵寶鏡衲僧臨臺如何相見師云謝三娘秤金進云若有聞法者無一不成佛師云鄧道士磨墨乃云今朝冬月初一林間祝聖雲集長老稽首焚香大眾歌揚佛事風清月朗星稀霜寒普天匝地歸來宴息方安又見竺禪催逼懇請為眾宣揚鐘鼓喧騰不息既然策杖陞堂肚裏全無半字頻將麈尾高揮人各眼眼相覷有等不省禪和喚作西來祖意只饒虛空點頭山僧向道未是不信誠實之言苦哉自暴自棄拈棒打出山門大事因緣了畢且道是何意旨驀伸手云還會麼大千沙界掌中觀摩訶般若波羅密吳憲副入山示眾問正心誠意乃盡性之微言嚥氣吞精是修身之笨法離此二途請師荅話師云薄暮鐘初動開簾喜見君進云此猶是落艸之談如何是格外一句師云問荅自分明進云某甲即不然師云你道看進云千峰勢到嶽邊止萬泒聲歸海上消師云三十棒待別時來乃云道遠乎哉觸事而真聖遠乎哉體之即神拈拄杖豎起召眾云這箇是拄杖子還見麼因甚麼喚作拄杖子卓一卓云還聞麼若向這裏聞見分明不用之乎者也苟或未然山僧更與下箇註腳去也玅淨明心了見山河大地離諸名相方知日月星辰莫向外邊馳來惟在當人本具但自情消塵塵盡是佛國若以智照念念常見真人蓋因迷一心而跡困長途悟萬緣而功歸大道正所謂萬法是心光諸緣唯性曉本無迷悟人只要今時了且道如何是了底道理良久云水歸大海波濤靜雲到蒼梧氣象閒下座示眾現成公案美玉無瑕擬欲參尋雕文喪德何也聞聲悟道道不是聲見色明心心不是色打開東南西北一任豎抹橫該若遇靈利衲僧自然道頭知尾所以昔日溈山問仰山云涅槃經四十卷多少是佛說多少是魔說仰云總是魔說溈云已後說法無人奈子何仰云慧寂即一期之事未密行履在甚麼處溈云只貴子眼正不貴子行履看他父子酬唱略露風規可謂獅子哮吼而象王回顧大鵬展翅而丹鳳翱翔還會麼乃豎起拂子復擊禪床云水到灘頭連月送鳳飛天外帶雲歸魏夫人設齋偕男信官魏雲臺請上堂僧問昔日李牧主請沼祖於郢州衙內陞座今朝魏夫人領眷屬請法於風穴山中且道是同是別師云今之古之進云秪如牧主道佛法與王法一般又作麼生師云左之右之進云與麼則看破了也師云甚處見得僧禮拜師便打乃云見聞不昧指似覺源根境雙融打歸性地智鑑圓明而照諸群象真空湛寂而迥絕端倪觸處卓爾現前靈機了然獨運不是心不是佛不是物脫體虛玄當恁麼時如靠一座須彌山巍然不動拄地參天歷歷無回互明明絕覆藏箇是解脫門超諸方便力可以滅罪消愆可以修因植福改禾莖為粟柄易短壽作長年為瑞為祥有規有鑑所以道佛真法身猶若虛空應物現形如水中月且道如何是應底道理豁開玅淨圓明眼識取吉祥安樂人若愚領南鄉眾施主請上堂師良久云正令已行十方坐斷千差合轍一句流通蓋天蓋地迥絕遮闌亙古亙今了無空缺塵塵攝入剎剎圓明莫向外求當人本具在聖在凡不增不減若僧若俗何淨何塵譬如虛空包含萬象而不被萬象之所隔礙又如蓮花從淤泥而生不被淤泥之所染污一段光明體本淨潔無門無傍四大皇皇吾不知其名字強名之曰道喝一喝下座除夕小參前年此日去歲今宵烏兔循環光陰倏忽尋常放過大似忘懷檢點將來渾如昨夢由是高提祖師心印去即印住住即印破不去不住正恁麼時要知杷柄盡在當人手裏心不思量過去事亦不希望未來法不於現在有所住三際平等一心空寂淨裸裸絕承當赤條條無向背在彼在此亙古亙今任運翛然隨緣得玅所謂無邊剎境自他不隔於毫端十世古今始終不離於當念然雖如是且道年窮歲盡時又作麼生爆竹一聲除舊臘梅花幾點笑春風解制示眾全提祖令鎮寰區倒跨楊岐三腳驢遊遍剎塵三昧海須知元在舊茅廬於此薦得直須向高高山頂立管教鼻孔遼天深深海底行倩取腳跟點地無去無來不動不變非彼非此自在自由所以修山主云二破不成一一法鎮長存若作一二會永劫受沉淪修山主雖則遍界分身杳無蹤跡正眼觀來未免藏頭露面風穴又且不然乃舉手云舒則為掌五指參差握則成拳全體獨露且道不舒不握又作麼生動止行藏惟自得縱橫收放更由誰解制上堂僧問大事未明時如何師云百鳥噪春光進云明後如何師云皇風成一片進云現成公案蒙師指德山因甚不會末後句師云闍黎道處自分明乃云汝海風穴寺衲子雲來集放下破蒲團結冬九十日不學如來禪那參祖師意坐臥與經行毋固亦毋必寒燒榾柮火肚饑要飯喫就裏問如何最勝無倫匹元宵制克諧心空而及第大眾念摩訶般若波羅密下座泉州召化桋菴和尚至引座蕭瑟西風破暑威庭前喜鵲噪清暉狼忙掃榻焚香竟報道同門訪翠微當此之際倒屣迎門顧鑑開懷一笑拱陞揖坐奇逢酌茗三盃只知吐膽傾心不覺忘前失後非但主賓一致更是水乳相投可謂千載一時欣幸無量所以道我本無心有所希求法王大寶自然而至遂召大眾如向這裏見得世法佛法一齊周備其或未然知事頭首恭詣召化和尚座前慇懃拜請伏惟慈悲開示
