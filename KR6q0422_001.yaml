束拈來撒向諸人面前了也若能於此薦得便見百艸頭上罷卻干戈紅塵堆裏縱橫自在笑他超凡越聖剜肉補瘡即妄明真朝三暮四直饒東澗水流西澗水南山雲起北山雲若到法興這裏更要勘過了打上堂僧問承師有言禪道佛法無多子秪要渠儂偷心死偷心未死時如何師云水向石邊流出冷進云偷心已死時如何師云風從花裏過來香進云若不同床睡焉知被底穿師打云切忌詐明頭乃云若論此事如將東弗于逮西瞿耶尼南閻浮提北鬱單越四至界畔早已盡情揭契分付與諸人了也只是中心樹子猶屬老僧在何也當頭如坐斷一劍倚天寒復舉疏山問洞山云未有之言請師示誨洞山云不諾無人肯疏山云還可切也無洞山云闍黎即今還切得麼疏山云切不得即無諱處洞山深肯之師拈云二老宿與麼酬唱可謂正偏回互兼帶協通拱密威嚴誰敢正視然雖如是在洞上家風則可若據法興這裏拄杖子未肯放過在何故無漏國中留不住月花影裏見應難晚參箇中誰解共揄揚無位真人不覆藏試把霜鐘敲夜月聲聲清韻落寒光示眾牛頭馬面虎狼肝月骨風神海量寬倒握龜毛三丈二乃云請續末後句便下座體監院誕辰請上堂僧問最後牢關即不問主賓互換意如何師云瑞艸生嘉運進云恁麼則推倒界墻去也師云靈花報早春僧禮拜師便打問有物先天地無形本寂寥能為萬象主不逐四時凋如何是萬象主師舉拄杖云會麼僧擬議師便打乃云天根栽下無明種銕樹芬芳博曉煙智慧花開香世界菩提果熟劫空前示眾舉昔城東有一老姥與佛同生不欲見佛每見佛來即便迴避雖然如是回顧東西總皆是佛遂以手掩面於十指掌中亦總是佛師拈云老姥不欲見佛無地藏身世尊隨處偵之何曾撞著遂驀拈拄杖云世尊與城東老姥即今來也在山僧拄杖頭上不以佛見不以法見汝等諸人作麼生與伊相見如向這裏見得不妨逸格超群隨方顯現脫或未然山僧重為頌出婆婆年老鬢如霜羞見同庚淚兩行一念纔興迴避處撞頭磕額竟難藏佛成道日呂總戎請上堂僧問釋迦老子夜睹明星悟箇甚麼師云盜賊入空房進云五湖四海王化裏更無一物是塵埃師云閑言語乃驀拈拄杖云道遠乎哉觸事而真卓一卓聖遠乎哉體之即神復靠拄杖云還會麼萬里雲收天宇廓瞿曇午夜睹明星小參圓成正偏智絕纖塵寂寞幽閒體周法界應如是知如是見如是信解不生法相直饒恁麼也秪是箇黃連甜甘艸苦砒霜涼甘露惡豈不見道莫行心處路不掛本來衣何須正恁麼切忌未生時且道法興為人在甚麼處頻呼小玉元無事秪要檀郎認得聲喝一喝下座除夕小參金烏東上玉兔西沉寒暑遷流窮通變化始見椒觴餞臘俄然梅信傳春爆竹吹煙迎新送舊正當恁麼時曾憶北禪老漢烹露地白牛分歲闔院肥通玄先師煮透海烏雞過年齊家省儉然雖二老各善因時致宜仔細檢點將來猶未稱衲僧本分作略法興今日臘月三十日到來無可與諸人分歲也不忍害物傷慈宰割生命唯只薄㓟明月細切清風醋煮森羅薑調萬象殷勤作一家宴且不許貪滋嗜味貴圖諸人箇箇一飽忘百饑免得倚他門戶傍他墻剛被時人喚作郎山僧如此施設汝等還曾知足也無驀拈拄杖云一言金石談來重萬事鴻毛脫去輕擲拄杖歸方丈堅白禪德製大法被回上堂東君智巧化母功深把住洪鈞密運放開仁育無私不假玉線金針繡出雲山疊翠信乎天機梭意織就花雨繽紛氣含百億須彌等現微塵剎海賽過吳綾蜀錦拈來高掛堂便見牡丹芍藥仗春光而鬥彩師子象王承法力以爭雄不唯祖室增輝更乃人天交慶何妨空一心而仰望盡五眼之奇觀然雖如是且道憑誰恩力遂拈拄杖指法被云還會麼卷舒方外乾坤廓葉綴花王寶座新下座示眾昨夜三更走卻牛天明起來失卻火渾家廝炒理不清我罵你兮你罵我休罵我萬法因緣隨分可解制上堂僧問結制之時即不問解制已後是如何師云小慈防大慈進云恁麼則打開欄圈無拘束師便喝進云放出金毛獅子兒師復喝乃云橫按吹毛遶萬旂堂山下破重圍九旬戰罷成何事贏得心空及第歸下座師誕辰眾請上堂僧問如何是父母未生前本來面目師便打僧便喝師又打進云離卻棒喝又作麼生師云不知好惡漢乃云㘞地一聲打破乾坤全體露光通三際劈開混沌永流輝即真即假而性相圓明非異非如而玄機普應卷舒自在動止恒然但了諸見同源便是無生法忍所以道諸法不自生亦不從他生不共不無因是故說無生既不自不他生不共不無因且道如何是無生驀豎拂子云匝地普天何處覓東風漏泄柳條邊下座住隨州法興禪寺語錄終雲峨喜禪師住河南汝州風穴禪寺語錄師在湖廣隨州堂山法興寺受請於大清順治十三年歲次丙申八月十一日進院至山門云門墻岸岸高而不危關鎖重重深莫可測不須動著關捩早已八字打開信步便行任渠出入佛殿云琉璃殿上簸土揚塵糞掃堆頭紫金光聚且道優劣在甚麼處撒開坐具云看看便禮拜伽藍堂云神之格思不可度思矧可射思為法金湯多義氣渠儂曾不隔毫釐祖師堂云一花開五葉深密固靈根萬古及千秋香飄因果熟如何見得乃上香云一二三四五六方丈據座云對眾拈花掀翻囊橐逢人面壁漏泄天機輥毬舞笏而枉費精神豎指擎拳而徒勞鈍置且道新風穴又作麼生拈拄杖喝一喝便起中秋日開堂至法座前以拄杖指云當陽一句坐斷毘盧頂𩕳格外三玄放出衲僧巴鼻有利有害全主全賓還見麼便陞座拈香云此瓣香端為祝延今上皇帝聖躬萬安恭願睿筭彌隆等乾坤而鞏固龍圖鳳曆同日月以常輝次拈云此瓣香奉為滿朝文武天下宰官本郡諸衙勳貴暨及鄉紳文學眾護法伏願壽等椿松之老福於滄海之深常為聖主之股肱永作法門之城塹又拈云此一瓣香大包無外細入無內渾圇無縫罅收放絕形蹤昔年棲真第一句下承當今日風穴第五回拈出奉為浙江寧波府天童堂上傳臨濟正宗第三十一世林野先師大和尚爇向爐中用酬法乳之恩遂斂衣就座維那白槌云法筵龍象眾當觀第一義師云把住牢關點水滴凍放開一線塞壑填溝拈頭掇尾迥絕名模不屬見聞還有解觀者麼良久乃云摩訶衍法透脫凡聖根源般若智光洞明生死幽闇直超物外而不歷僧祗跡溷塵中而遠離諸著無在不在互攝互融觸處現成全機獨露諸佛以此度脫眾生則無生不度祖師以此提持心印則無法不圓國王以此化育蒼生則天長地久賢佐以此保國安民則皋夔稷偰山僧以此拈提向上巴鼻則追迴人天寶所重興風穴道場大闡玄音恢弘祖道然雖如是且主賓契合正令全提一句作麼生道驀豎拂子云月籠丹桂遠星拱北辰高謝辭竟復舉當山遠祖沼和尚云若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安帖於此明得闍黎與老僧亦能悟卻天下人亦能迷卻天下人欲識闍黎麼右邊一拍曰這裏是欲識老僧麼左邊一拍曰這裏是師拈云沼祖恁麼施設可謂文武兼備將相雙全傍敲正打而迥絕離微收放縱橫而光揚聖化還知端的處麼秋水長天同一色落霞孤鶩與齊飛維那白搥云諦觀法王法法王法如是下座汝州僧和菴同居士田鍚九趙天雨徐顯吾領眾請上堂僧問若立一塵家國興盛野老因甚顰蹙師云風幡繚繞進云庭前生瑞艸好事不如無師云燭影搖紅進云不立一塵家國喪亡野老因甚安怗師云贏得自幽閒進云海闊從魚耀天空任鳥飛師云看腳下進云放出銕牛耕夜月展開木馬撞春風師云天高地厚僧喝師便打乃云覺天朗耀智海澄渟了無名相之端頓絕是非之表譬如獅子哮吼而壁立萬仞象王回顧而截斷群疑大用現前動入無作風穴恁麼提唱直與八字打開更不囊藏被蓋十分顯露自然月白風清頭頭不昧剎剎圓融世出世間本無二致且道如何是無二之旨以拂子擊禪床云但能萬法不干懷一超直入如來地下座結制示眾參禪別無奇特秪貴心頭休歇稍有纖毫情存敢保驢年未瞥所以道靈光不昧萬古徽猷入此門來莫存知解良由不識本源迷其正覺便乃隨情附物逐境心生但能一念情忘自然真常體露驀豎拄杖云這箇是風穴拄杖那箇是真常體擊禪床云這箇是真常體那箇是風穴拄杖復作釣魚勢云還會麼長竿夜靜頻垂釣曉得金烏帶月收開爐結制河南府郭定宇請上堂僧問龍象交參高賢聚會今日郭居士覿面拈香請師指示師云庭前古柏參天秀溪底清泉入海長進云畢竟如何師云向陽花易發背陰雪難消進云謝師指示師云錯問高踞毘盧頂𩕳直透威音那畔猶是聖諦窠臼秪如杖林山下竹筋鞭意作麼生師云山頭翻白浪海底起紅塵進云萬樹逢春皆翠色百川到海一般聲師卓拄杖云這箇聻進云松環翠壑雲為伍詩瀉泉聲月共徘師便打乃云今朝孟冬十五祝聖搥鐘擂鼓長老拽杖登堂四眾雲臻若堵諸方說道談禪風穴一味愚魯深深掘地開爐秪要烹佛煉祖不容擬議踟躕直截當陽薦取虛空努目揚眉覷見賓中之主燈籠拍手呵呵庭前露柱作舞門外案山點頭老僧未敢相許為甚如此從來重法有先賢此道時人賤若土復舉趙州諗禪師因真定王攜諸子入院州坐而問曰大王會麼王曰不會州曰自小持齋今已老見人無力下禪床王猶加禮重翌日令客將傳語州下禪床受之侍者曰和尚見大王來不下禪床今日將軍來為甚麼卻下禪床州曰非汝所知第一等人來禪床上接中等人來下禪床接末等人來三門外接師拈云道尊德備善能誘掖三根縱奪可觀到底終歸一致在趙州可謂建化之門至矣若據風穴又且不然無論上中末等到來一例看承何也不用抬眸列賓主相逢盡是箇中人下座示眾三世諸佛說不著歷代祖師提不起天下老和尚袖手傍觀風穴不費纖毫力直下信手拈來橫拖倒拽任其所為且道利害在甚麼處驀拈拄杖攛下云一馬生三寅小參將心作佛剜肉補瘡了妄歸真潑油救火機前荷負而平地千差直下承當而白雲萬里總不恁麼入無間獄行但行坐但坐饑來喫飯困來打眠也只贏得一味平常猶未是衲僧向上事何也三面狸奴腳踏月兩頭白牯手擎煙郟縣徐邑侯入山請上堂師拈香祝聖罷復拈香云此一瓣香爇向爐中奉為縣主徐居士伏願道心堅固同日月以長明福海淵深並椿松而永久攝衣就座云把住則天寒地凍涓滴無遺放行則耀古騰今淆訛太煞當恁麼時不放行不把住試出來道看僧問爐鞴宏開高賢聚會天廚始建土曠人稀即今縣主徐公入山設齋請師垂示師云瞻之仰之進云財法二施承普利直截根源意若何師云一把柳絲收不得和煙搭在玉欄杆僧喝師便打問橫按莫邪全正令高提祖印喪全機如何是傾湫倒嶽的事師云險進云大冶爐中銷片雪電光影裏走轟雷師云纖毫竟不存進云掀翻獅子窟倒捉玉麒麟師便打僧便喝師復打乃云兀坐虛堂適自饒庭前喜鵲噪聲高山童報道無他事幸荷文星慰寂寥當此之際古寺崖房頓覺祥雲靄靄僧堂寮舍偶爾瑞氣騰騰正恁麼時全賓即主蓋古通今凜凜孤危澄澄光彩廓示人天眼目鼓揚佛祖家風超出毘盧頂𩕳永證金剛種智始從般若願力得如是自在威神以此祝聖則天長地久以此修因則福慧圓明以此治政而教育生民各各安家樂業識法根源俾其凡聖無二無別且全機一句又作麼生道只將補袞調羹手撥轉如來正法門冬至上堂僧問一陽來復大地春回為是神通玅用法爾如然師云烏雞雪上行進云秪如無孔銕鎚又作麼生師云石筍夜抽條僧掀禪床師便打問語漸也返常合道論頓也不留朕跡秪如世尊拈花迦葉微笑且道是漸耶是頓耶師云兩段不同收歸上科進云恁麼則學人把斷要津一任針鋒不入去也師云你即今在甚麼處僧喝師亦喝進云龍袖拂開全體現象王行處絕狐蹤師云看腳下師乃以拂子劃云混元雖剖道常存寒暑遷流日月新偶爾群陰消剝盡嶺梅又放一枝春喝一喝下座上堂僧問深居方丈正令已行既出法堂如何施設師便打進云梅花放出先春信師云節令不相饒進云陣雲橫海上拔劍攪龍門師云惹得清風動地來進云野老不知王化只解醉舞村歌師云好箇消息僧便喝師便打乃云茲因雪兆知客偕登封空寂比丘領彼一鄉善士不憚溪山迢遞之勞得得來山揮金辦齋供養十方龍象仍請山僧陞堂舉揚箇事與大眾結般若之良緣以表財法二施等無差別若據箇事諸人未動腳跟以前山僧未出方丈之際元來具足大道天然本自現成靈光不昧何須更覓談玄說妙指東畫西恰似與缽盂安柄有何益耶如其向這裏薦得各請歸堂不妨省力苟或未然山僧向土上加泥去也遂以拂子作圓相召眾云還會麼智鏡光寒一舉千差同照燭心淵澄徹圓收萬泒盡朝宗動止信其自由行藏了無向背隨緣不變任運騰騰正所謂似地擎山不知山之孤峻如石含玉不知玉之無瑕在聖不增在凡不減居僧本淨處俗無塵二諦融通了無障礙下座示眾道在尋常休自謾當陽拈出與君看冬風驀面吹來急無位真人徹骨寒擊拂子均濟禪人同若愚領眾設齋請上堂師云南無清淨法身毘盧遮那佛圓滿報身盧舍那佛千百億化身釋迦牟尼佛遂召大眾云此三身中且道那一身合受人天供養乃合掌云心燈烈焰傳芳遠一點無私照古今下座晚參舉趙州示眾云金佛不度爐木佛不度火泥佛不度水真佛內裏坐師拈云趙州恁麼舉揚可謂盡情剖露徹底掀翻大千沙界不立纖毫一微塵裏全身獨露法法不相到念念無所虧且道是何意旨貧無達士將金贈病有閒人說藥方示眾風生大野霧起長空冰鎖寒泉霜凝艸木一一正法眼藏明明佛祖家風卷舒本自一如表裏元無二際普天匝地徹古通今所以道一切法不生一切法不滅若能如是解諸佛常現前然雖如是有人於此蹲坐風穴打了趁出佛成道日洛陽同源法師領眾請上堂僧問橫抽寶劍亞豎青鋒如何是萬象之中獨露身師云喪汝命根進云大鵬直奮摩霄翼誰顧崩騰六合雲師云看腳下僧喝師便打乃云擊碎虛空一一山河歸自己掀翻沙界明明慧日照群生超情越量而物我同源蓋色騎聲而古今不別該羅萬有及盡玄微不離夢宅而遠登真覺之場匪隔幻身而直證金剛之體正所謂即含靈顛倒之心見諸佛圓常之性是以釋迦如來始於正覺山前臘月八日忽睹明星廓然大悟乃云奇哉奇哉一切眾生俱有如來智慧德相蓋因妄想執著而不能證得且道離卻妄想執著喚甚麼作智慧德相下座各具威儀至大殿拈香諷誦除夕小參白雲堆裏風穴寺中坐消日月歲盡年窮我此一眾四來禪似箇箇懷勇健之能人人絕情謂之見隨緣著衣喫飯坐臥經行自由雖云春夏秋冬不被寒暑遷其本志使得十二時辰不被十二時辰使何故聻今年今月今宵盡明歲明春明日新解制小參過去諸如來斯門已成就擔雪填枯井未來修學人當依如是住灘頭鳥作窠現在諸菩薩今各入圓明月巢空鶴夢若能於此廌得便見靈源玅密智體虛閒及盡玄微了無依倚秪如打破生死牢關掀翻聖凡窠臼又作麼生道驀豎拂子云春色滿園關不住一枝紅杏出墻來元宵永寧僧云何領眾請上堂僧問一堂龍象眾同上白牛車秪如車在這裏牛在甚麼處師叱云快走進云打開欄圈無拘束一任東西自在遊師云看取水艸僧喝師便打問三藏十二部一切修多羅學人不會一字師云海墨書而不盡乃云十五日以前東西南北位依然十五日以後海潮東注皆仍舊正當十五日天高地厚藏虛寂夜月燈光徹曉寒敲鑼擂鼓絲絃吠村歌社舞鬥施呈幾能於此知端的無位真人笑點頭萬象森羅皆惺歷大眾還委悉麼乃攛下拄杖云我見燈明佛本光瑞如此本寺慧菴耆舊領眾為師慶誕請上堂云太陽溢目匝地韶光覺海無涯性天寥闊艸木含紅綻綠漁樵鼓腹謳歌人人喜氣盈眸物物舒情暢意不離見聞知覺當體越色超聲即此便是華藏莊嚴毘盧境界塵塵顯露剎剎圓明正當恁麼時且道無位真人本命元辰落在甚麼處翠竹叢中歌款乃碧崖深處臥煙霞下座慧泉禪人領眾請上堂僧問拈起吹毛劍截斷葛藤窠請師向上機師便打進云木馬衝開獅子窟石虎產下玉麒麟師云那裏見得僧便喝師便打乃舉黃龍南禪師住歸宗日因化主回陞座示眾云有五種不易一施者不易二化者不易三變生為熟者不易四端坐喫者不易且道第五不易是甚麼人良久云聻便下座時翠巖真和尚為首座藏主續問第五不易是誰真云腦後見腮莫與往來楚石琦拈云山僧即不然第五不易是誰莫怪坐來頻勸酒自從別後見君稀師拈云風穴又且不然第五不易是誰澗水如藍花似錦法身何處不相逢觀音會社首王化仁領眾請上堂大道恢弘神情莫測其量玄機玅密聖智無以等階統萬法而遇緣即宗會一心而歸根得旨明如杲日寬若太虛動若行雲止猶谷神以此津濟四生梯航九有法隨法行法幢隨處建立所以道若有國土眾生應以佛身得度者即現佛身而為說法應以菩薩身得度者即現菩薩身而為說法應以聲聞身得度者即現聲聞身而為說法應以國王身得度者即現國王身而為說法應以宰官居士身得度者即現宰官居士身而為說法應以天龍夜叉人非人等身得度者即皆現之而為說法由是悲心普運慈濟無方隨類現之本無作意然雖如是且道大悲菩薩即今在甚麼處以拂子擊禪床云萬籟有心聞不得孤崖無耳卻知音結制小參萬年一念一念萬年性空寥廓體最幽玄取不得兮捨不得仰彌高而鑽彌堅提起衲僧巴鼻穿透佛祖心肝直指分明如不薦更與重重說偈言還會麼須彌搥打虛空鼓取之左右得逢原結制上堂僧問爐鞴未開煙光寂寂鉗鎚既動烈燄騰騰假饒不涉肯綮的又作麼生煆煉師云收歸自己進云與麼則天地同春色萬物盡含輝師云甚處見得僧喝師便打問水天湛碧夜月涵輝時如何師云恰進云向上還有事否師云眉毛八字橫進云與麼則一陣繽紛花雨落依俙鳥宿不萌枝師云火官頭上風車子問十方世界智體全彰性海流通竟歸何處師云速禮三拜乃云朔風凜凜掃林木而葉落歸根彤雲羃羃作霜寒以時還舊令蠢動含靈閉戶森羅萬象收聲境物蕭然乾坤肅寂當此之際五湖衲子四海遊人脫下芒鞋拋卻拄杖同居風穴山中聚首白雲寺裏無拘堂內堂外不容學佛學祖但以無功用行於十二時中行住坐臥運水搬柴著衣喫飯隨緣自在如龍得水似虎靠山箇箇顯發莫大一段威光然雖如是離四句絕百非上無攀仰下絕己躬驀豎拂子云且道這一著落在甚麼處冷向地爐燒煖火來年春雪日輪銷下座高平直指法師至陞座僧問虎生七子為甚第七箇無尾巴師云香煙合匝進云自有一雙窮相手未曾低揖等閒人師云太尊貴生問鉤頭有餌句底無私如何是無私句師云一跳出洪波進云孤輪獨照江山遠長嘯一聲天地驚師云且喜上釣來問無上法王有大陀羅尼門名為圓覺性海如何是大陀羅尼門師云如是我聞進云三世諸佛皆從此經出是否師云信受奉行乃驀豎拂子召大眾云還會麼靈光不昧智體何依觸處圓成有誰鑑覺於此薦得竟虛空以為體三乘五教湛心源遍法界以作身頓漸偏圓歸性海豁開頂門正眼直下爍破昏衢你若採折將來直教頭破腦裂何也一句窮源沉埋祖道萬緣寢息獨露真常遂舉拂子云這箇是色那箇是真常復擊禪床云這箇是真常那箇是聲還委悉麼欲得不招無間業莫謗如來正法輪晚參僧問不得有言不得無言離四句絕百非直捷一句請和尚道師云省卻山僧多少力進云秪要和尚恁麼道師云你不是知音進云須知雲外千峰上別有青松帶露寒師云瞎僧喝師云瞎瞎乃舉芙蓉問歸宗云如何是佛宗云即汝便是進云且道如何保任宗云一翳在眼空花亂墜師拈云傍敲正打豁開向上玄關語的言端拽回衲僧巴鼻歸宗可謂好手若是風穴即不然如何是佛嶺梅殘雪後雲鬢未梳時且道如何保任森羅萬象不礙眼光示眾舉趙州和尚因僧問初生孩兒還具六識也無州云急水灘頭打毬子僧復問投子青云急水灘頭打毬子意旨如何青云念念不停流師乃召大眾云還知二老落處麼如其知去念念攀緣心心永寂圓融法界親證無生脫或未然更與頌出急水灘頭解打毬波翻浪湧不停流要知念念圓明處萬象森羅一鏡收擊拂子焦應斗領眾請上堂僧問萬法從心生諸緣唯性曉秪如一法不存時心與性在甚麼處師云雲收天字廓紅日照無寥進云掬水月在手弄花香滿衣師云好箇神通玅用進云不勞讚歎師便打問棒喝交馳衲僧茶飯檀波羅密便請垂慈師云蘇嚕蘇嚕進云與麼則日月光照遠乾坤覆載隆師云㗭唎㗭唎僧喝師便打乃云有句無句如藤倚樹樹倒藤枯南無薩𠶒哆阿羯唎虎𤙖都盧雍恁麼恁麼腰纏十萬貫騎鶴上楊州不恁麼不恁麼艸枯鶯眼疾雪霽馬蹄輕然後恁麼中不恁麼不恁麼中卻恁麼顛拈倒用收放縱橫隱顯隨宜得大自在這裏見得著衣喫飯綿綿不漏纖毫坐臥經行歷歷了無回互士農工商各營本業六凡四聖同證無生秪如截斷四路葛藤獨露當陽一句又作麼生道高懸日月乾坤廓大闡洪音唱祖機上堂僧問人人本有靈光為甚麼晝明夜暗背覺合塵師云紅霞穿碧落進云覺塵俱絕時聻師云猶在半途進云有水皆含月無山不帶雲師云且居門外問雪滿峰頭寒色翠喬松野鶴影團圞且道是明法身邊事明色身邊事師云江南三月裏鶯囀百花香進云與麼則直入雲霄外不宿梧桐枝師云腳下黑漫漫乃云今朝仲冬初一萬里晴空杲日峰頭極目無涯就中好箇消息若問此意如何佛祖都盧不識風穴豈忍囊藏特為登堂指示人人頭頂青天箇箇腳踏實地諸仁亟切承當大事因緣了畢莫怪山僧多口面赤不如語直何謂心同虛空界示等虛空法證得虛空時無是無非法既無是法又無非法且道虛空作麼生證萬象森羅影現中摩訶般若波羅密河南府寧僧綱同灑輝敦請小參僧問古人小參不荅話和尚今晚荅話不荅話師云靴裏動指頭進云漏逗了也師云你那裏見得進云未向滄溟拋玉餌金鱗早已逐浪飛師云跳出浪頭高乃云觸著霜風透骨寒發明父母未生前箇中如未知端的白棒重拈為指南乃卓拄杖云大眾會麼第一義門脫體弘開諸三昧海當陽顯露更不囊藏被蓋何用吐膽傾心在彼在此以隨緣若聖若凡而莫測人人常光現前箇箇壁立萬仞到這裏須知轉身一路別有生涯大用全提放出衲僧巴鼻始得且道如何是衲僧巴鼻掀翻海嶽無何有明月清風福一生冬至小參寒暑遷謝日月循環不動璇璣周而復始茲乃陰陽莫測之神功造化無私之妙理豈非天有顯道而厥類惟彰變化窮通應時及節者耶驀拈拄杖云雖然如是爭似山僧拄杖子列列挈挈昂昂藏藏彌綸萬有不涉春秋觸事無為榮枯自異且道把定乾坤滴水滴凍包含法界亙古亙今又作麼生驀豎拄杖云獨有寒梅藏不住隴頭花發笑春風佛成道日示眾六載殷勤雪裏眠忍饑受凍苦多端掀翻鬼窟無尋處一點明星照膽寒值雪孟津自奇禪人領眾請上堂問掀翻海岳永絕囊藏衲僧分上如何施設師云好手手中呈好手進云頂門亞豎摩醯眼肘後斜懸奪命符師云萬古長空一朝