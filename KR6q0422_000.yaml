front:
  text: 語録題辭雲峨喜公蜀人也始從老僧棒頭喝下深中此毒自覺與衆不群買草鞋行腳至吳越參諸方眼高一世道逗群機毒氣一時陡發幸吾弟林野劈頭痛與一劑消道解毒湯渴可解毒可散自毒既瘥即能毒人但著毒者直教命根頓斷不復更轉別症返陰復陽雜毒入心者也老僧因讀其語録義不容默乃書片言以冠其首深愧鈍根不文直向佛頭著糞一任罵我否笑我否更誦一偈東家中毒西家發豈料西家毒更深自此吞雲并吐霧相將賣弄老婆心時大清康熙二年仲冬寓金城醉佛樓嗣臨濟正宗第三十一代破山明老僧書序原夫五燈並照單傳獨盛濟家一葉分榮正令全提密室欲觀撑天拄地之作略須憑超情絶識之體裁慨今鸚舌蛙聲盡陳雜調淺知薄解淆亂師承惟有風穴堂上雲峨和尚太白擎峰中流砥柱宗壇鐵漢風規丕著於諸方汝海獰龍骨格迥超乎群趣扶起當年剎竿直使歷代祖師口啞全提斬新條令從教天下衲僧耳聾參叩有神天奔趨多龍象鉗錘惡辣不假薪傳妙用縱橫打開正眼將見兒孫遍大地何嘗佛法作人情立謨範於萬仞之巔振頽風於千秋之日鐘鳴樹裏疑他清韻出山來鼓響煙橫幻似雷音驚夢起十方坐斷千里同風説法深藏陷虎機研窮須具金剛眼時大清康熙癸卯年季秋七十四歲同宗法弟𨍏轢嚴大參合十謹題雲峨喜禪師語録目次序文卷上住霍丘大別山普濟禪寺語録住汝寧光山縣普福禪院語録住羅山國祥山龍池禪寺語録住湖廣隨州落黃法興寺語録住河南府汝州風穴禪寺語録卷下住陝西長安大興善寺語録再住風穴禪寺語録問答入室機緣拈古頌古讚偈佛事雜著行實目録終
