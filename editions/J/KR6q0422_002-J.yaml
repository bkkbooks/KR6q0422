盞茶也不是佛事相酬亦非人情之故遂左右顧視大眾云既乎不爾且道是甚麼意思眾無語即搥胸哭云蒼天蒼天師至少林達磨祖堂設供拈香當陽顯露徹底無私彌綸萬有充塞十虛且道阿誰惟我震旦初祖菩提達磨大師掌握權衡拶碎寶珠而光通今古縱橫殺活捉敗六宗而玅協偏圓無端提箇教外別傳明謾赤子直指人心見性成佛誑諕閭閻三週航海兮不聞腳底翻白浪九年面壁兮那知頭上有青天梁王殿上躲避無門蔥嶺峰前抽身沒路斷送神光一臂喪盡自己全身及至末稍無合殺空棺隻履可憐生然雖如是且道風穴不肖遠孫到此如何為伊雪屈乃上香顧眾云還委悉麼一花五葉開無盡萬古春風動地香掃風穴沼祖塔上供畢師云黃面浙子風穴老人萬年一念七載單丁待讖仰山再來遇風即止傳持臨濟法道亙古流芳高提祖師心印搭破盧陂老面門倒跨銕牛之機捩轉李州牧鼻孔神情莫測真箇白拈誰知今日被不肖兒孫於狹路相逢和贓捉敗遂左右顧眾云當恁麼時且道放行好把住好乃上香云須知箇裏情相似日日香花夜夜燈掃首山念祖塔師拈香云門外三車土曠人稀相逢少箇中一致背陰山子向陽多若隱若顯絕遮闌亙古亙今無障礙常轉如是經百千萬億卷此乃吾遠祖法華念和尚尋常用處遂以拂子於空中點一點召大眾云會麼復作相云就裏綱宗何所憑咄哉巧女拙郎君著靴水上觀雞鬥贏得清秋月一輪順治庚子秋師至熊耳山空相寺掃達磨初祖塔上供畢乃云碧天明月朗秋空東震西乾一徑通先聖去來無朕跡蕭然一塔鎖熊峰恭惟我鼻祖菩提達磨大師大和尚遠辭竺國航海梯山面壁少林拋磚引玉蔥嶺西歸逢宋雲空棺隻履難迴避一花五葉應時開萬古聯芳香馥馥乃召云大眾即今還見得麼以拂子劃此相遂展拜掛鐘板師指云秪這二上座從來覿面無情全體大機大用傳持佛祖號令艸偃風行洞明衲子聲光普天匝地只饒諸聖到此總教迴避無門永振叢林真規悉皆內嚴外肅惺惺寂寂而圓應無虧密密綿綿而抑揚有準遂舉起召眾云還會麼任是銅頭銕額漢也須聽取令行時擊擊便掛為惺渠宗知客起龕初任維那職師拈拄杖擊龕云主人公惺惺著不拒見聞與知覺語默動靜絕安排十字縱橫活潑潑且道路頭在甚麼處乃以杖引云須向這裏行十方無壁落舉火云數聲清磬海眾同歸一盞麤茶高賓聚會有禮有義無作無為輔弼宗猷叢林綱領此是惺渠宗禪人尋常用的山僧即今更當示汝末後一著以火炬打相云烈焰爐中飛片雪當天迸出一輪紅攛下便燒香嚴宕山法弟訃音至拈香云釋迦大師昔向雙林入寂宕山和尚今於香嚴收聲雖然同道不同途要知鼻孔無兩樣何也生死去來了無朕跡光前絕後㳷合一如分明掣電爍長空驚起泥牛入滄海遂左右顧視云大眾正當此時還有知香嚴和尚安身處麼以拂子劃相云透過荊圈與栗棘當頭坐斷是非關為朗書記舉火舉起火炬云朗上座還見麼這是你尋常用處如或未委更與道破一字不著劃文綴珠璣八法任安排義空藏海諸法性離故秪此用無窮雖然如是切忌向這裏安身立命更須懸巖撒手直下翻身自肯承當了無餘事何也箇中莫使墨淋漓此去再來吞佛祖為慧生侍者舉火湛碧秋空月正圓風凋桐葉墜翩翩隨緣不變金剛體獨露分明在目前須透脫莫貪觀巾缾左右得逢原更有末後全提句烈焰爐中片雪寒攛下火把喝一喝便行為還真舉火師云春光婉媚燕喜鶯歡柳線繰風百花爛熳正恁麼時本福禪人何妨放身捨命直下承當即境明心了無障礙遂拈火炬指云委悉麼地水火風各歸本際見聞知覺共證圓常去來杳絕形蹤就裏隨緣不變且如何是不變底道理乃攛下火炬云銕牛火裏解翻身無位真人歸帝室為修明舉火舉火炬云單複圓修甚善哉涅槃路上任徘徊分明指點歸家處乃攛下火炬云優缽羅華火裏開入塔以拄杖指骨襯云這些子最靈物非色非心亦非佛幾番嗔了幾番喜光明聚散無拘束復擊塔云好把無縫塔敲開遂以骨襯入塔云隨緣且向此中住此中住聖凡同唱無生曲為荷潔舉火蓮花荷葉搖拽清風而體自馨香出水離塵靄映祥雲而元本淨潔根敷曠劫葉茂今時開謝乘春了然不昧秪如不屬榮枯一句又作麼生道拈火把打相云還會麼古鏡不磨還自照靈花火裏濕秋光便燒為衡岳舉火舉火炬云衡岳衡岳汝還會麼覺海澄明性天寥廓直下承當頓然超卓如或沉吟更與道破乃攛下火炬云箇中但自了無餘沙界縱橫活潑潑為不二舉火拈火炬云大地陽回春晝長東風吹徹柳稍黃不二門中方措足火裏曇花分外香便燒雜著住鄧州慶祥寺安禪接眾引茆堂冷淡若據佛法全無山寺凄涼唯儲水艸具足善解餧驢餧馬而休云接待不易貴圖止饑止渴而豈懼設施艱難為憐苦困瞎駒兒要與打開正法眼使伊箇箇暉天鑑地踢蹋翻騰亦任昂昂北往南來縱橫自在莫只全靠慶祥敢冀大家出手但能樂意垂允便請直下承當化浴室引勺水恒河好看滔天浴日紅塵滿面須信達本還源到此都盧揭下炙脂帽子脫卻鶻臭布衫一澆一𬇴休教打濕眉毛百蕩百磨直須揩拭鼻孔掀翻跋陀婆羅境界觸發無垢淨光家風不是慶祥開拓門庭要顯當體風流脫灑即斯玅觸宣明便證成佛子住齋榜二首弘開爐鞴烹十虛而烈燄衝騰高舉鉗鎚煉三有而心空及第饒伊聖見凡情到此不留朕跡縱是銅頭銕額總教徹底鎖鎔奮大機顯大用還我風穴家風助其柴添其炭盡在檀那出手欲得一火鑄就直須二事拈來幸蒙垂允請註芳名打破慳囊洞見三輪空寂豁開正眼了知一性圓明香積世界流通法喜堂前親證如或自肯贏得飽餐茶榜切以透脫情關直截一條活路抽開識鎖當陽十字縱橫但能足下無私信知路頭不別賢愚貴賤各有所歸士農工商咸由此道祁寒溽暑往來曷辭苦骨勞觔風雨晴煙閒忙盡叫口乾舌渴可憐心頭熱悶不忍袖手傍觀應須鎚碎龍團正好當道煎點掇出趙老三盃欣然請坐吸竭盧仝七碗掉臂便行不特滋味殊深大都清涼熱惱雖則任我攔街把住憑君自肯承當休怪看客兩停元來一般管待莫向就中取則方知功德難量誰肯當前共成斯事入室規約風穴山深負米搬柴不易白雲路滑經冬過夏殊難衲子聚頭無非要發明己躬大事長老出世本擬求箇有血氣丈夫你既肯放下身心吾不辭略施毒手今當入室陞堂之際搗虛煉實之時快宜掃蕩胸中故習抖搜從前骯髒貴圖打開正眼莫憐爐鞴通紅秪要死盡偷心豈懼鉗鎚惡辣但能直截當前管取這回及第行實師一日因彝峰首座同兩序懷香率眾入方丈請示行腳啟迪將來師卻之再三眾堅請不已遂曰山僧生平履歷備述繁多不負懇請略言節概余乃成都之資陽人也俗姓陳母張氏生於萬曆四十一年癸丑正月二十四日子時賦性果毅世居隆昌清潭里七歲入鄉校智性遲愚讀不甚解天啟元年中秋過溪見深潭一屍被魚鱉唼噉爛臭不堪乃追念云人既死已性歸何處偶動諸行無常之感一日館中讀論語至朝聞道夕死可矣持問先生曰何如是道先生曰日用當行即道余曰一口氣不來道在何處先生躊躇曰命之理微吾所未知釋門有見性高人可往請教當為發明余乃嘆曰秪此於道無聞縱讀九丘八索三墳五典也了生死不得須學出世法可矣遂掩卷輟讀決志出家父母難之即數日絕食饑渴殆死時方鄰皆看先母番然謂親族曰小兒原有其因我記當年夢一頭陀僧造門投宿觀彼容貌威嚴乃卻之曰此是紅塵陋巷不敢屈留僧舉手中如意曰不然以此暫寄何如我即拜而受之復問老師何處僧西指曰峨眉雪鎖白雲深覺而遂生凡見僧便喜稍長即歌詠梵唄雖嬉戲皆為佛事以此可驗則有夙根他欲出家宜無阻滯因送淨居山寶峰寺禮寶山啟尊宿披剃曉夕忘疲惟勤禮誦丙寅春夜坐危樓忽想天地間為甚麼有我畢竟我生從何來極窮古今時分莫測始終十方虛空盡無邊表即駭然汗下不覺黎明尋走鐘興寺謁心玄和尚玄引法華經云如來知見廣大深遠禪定解脫深入無際此是夙植般若種子今乃發現志宜勇銳必期證道而後已復問汝號甚麼余曰惟致得名請師賞號玄曰據汝夢感生緣可號雲峨仍贈以偈曰白雲鎖雪一峰寒極目寥寥天地寬象駕夤緣悲行普夢回相笑太無端余禮謝而歸余家寺敏兄志先在道深承策進往劉家靜室同淨空師結社依博山警語做工夫雖曉夜參究猶恨歲月飄忽己事不明仍回寶峰立死限一年苦於昏散二魔引錐痛劄種種鞭逼亦未了辦復往祝家菴參印心和尚一見便問汝從何處求余曰淨居山師曰父母未生前你在甚麼處余曰某甲正疑不知我生從何來胸中如一座銀山銕壁苦沒奈何伏望慈悲指示師叱曰去汝不會我語余方舉步師驀喚一聲余應諾師曰且道應從何來余恍然了解自此凡閱諸典皆達意趣留止一年侍師至天峰圓戒時年十九即崇禎辛未歲也因遊峨眉路逢一僧自南方來敘及密雲老和尚乃臨濟正宗在金粟開堂有法嗣破山和尚現住萬峰門庭孤峻余聞之喜躍即中夜焚香遙禮默禱早見為幸至墊江適象崖師開法南山往謁之同見萬峰和尚便問把住牢關聖凡莫測放開一線略許商量除去二途請師相見山曰瞎余曰虛空無縫罅法體絕形蹤為甚大悲菩薩現千手眼師曰死水不藏龍余曰如何是活水龍師拈棒打出不幾辭歸省親至內江東坡庵閱藏三年凡於義路文字便理會相應佛祖關鍵隔絕難透愈見淆訛疑情轉熾偶聞破和尚赴盤龍請先到俟候師見便問老僧到這裏已是無端汝來堪作甚麼余曰不是冤家不聚頭山曰三日不相見莫作等閑看你鼻孔近日如何余曰依然搭上唇山曰為甚沒了半邊余曰盤龍門下制中每進方丈呈見識屢遭痛棒打出彼時世界身心渾成一塊意識都忘似不有我惟覺昭昭靈靈而已一日晚參出問碧天明皎潔皓月映寒潭時如何師下禪床痛打一頓昏絕擗地時雲石惺渠抬至僧堂五鼓方甦冷汗如洗維那圓明兄問老兄見箇甚麼道理余曰莫眼花明曰適纔向甚處去也余便掌曰會麼明變色曰羅剎禪余曰你只管喫掌次日命入室師問路逢達道人不將語默對你作麼生對余曰某甲今日放和尚過師曰為甚麼如此余曰昨日喫痛棒而今不覺饑師曰裝死賣活漢余曰怕某甲不實那師拈棒指曰你看果然腳跟未點地在余便喝師直打出解制師赴瀘州方山請命余維那職後侍師遊戎城請假下南方師乃種種開發出蜀抵荊南聞密師翁圓寂乃謁金粟費隱和尚問千里聞風即且置覿面相逢意若何師便棒余曰劉郎不解藏春色漏泄枝頭多少香師曰不遇攀花手徒勞造化心余便喝師便打見師鉗鎚玅密本分接人乃親炙座下每與師往復諮酬當仁不讓解夏師上堂末曰諸兄弟從今解制後或東去西去忽然撞著猛虎當路又作麼生眾擬議師拈棒下座一時打散余當下猛省入方丈呈白師曰如何是你本分事余擬荅師曰得箇驢兒便喜歡未在未在即推出余告假師固留余呈偈曰獰龍隱顯迥誰儔氣宇昂藏出眾流大底不貪香餌味翻身破浪五湖游上天童禮密祖塔參山翁和尚一日入室師舉洞山古鏡話問曰你道甚麼意旨余曰未到天童知何處行來方見路高底師曰這漢拶著便見瓦解冰消余曰明眼宗師天然有在師打出解夏辭師遊天台參通玄林野先師問杖頭挑撥罕遇知音狹路相逢如何即是師曰雲霧鎖青山余曰未到天台不妨疑著師曰持蠡酌海妄測淺深余曰不因樵子徑爭到葛洪家師曰峰巒挺秀鳥道難通余便喝師便打見眾中俱是清苦操道之士乃親依座下通玄高寒務重余衣單淡薄五年未得綿花上身因染危病瀕死方愈即命職副寺一日師問在此作麼余曰打整庫房收拾東西師曰佛祖爪牙衲僧巴鼻你作麼生收拾余曰別處容和尚不得師曰今年合得好醬余曰貪嘴老婆說食香師曰常住淡薄老僧明日向尚州托缽去也余曰艸戒木師休去一日入室師問內不放出外不放入正恁麼時以何為界余曰百艸頭邊露師曰甚麼人證盟余曰明月與清風師拈棒余一喝便出師乃命余主客司職至丁亥五月十七日侍師遊山至文詞庄師問等閑拶著即轉轆轆的我這裏總用不著將你從前所得所證據實說與老僧看余乃盡情呈白一上師搖手曰不是不是余曰向來師皆肯可如今為甚麼不是師曰此是口耳之學識解依通盡屬生死根本余殷勤請益師曰且道山河大地明暗色空與汝自己是同是別余曰同則摠同別則摠別師正色呵曰說得道理好余方佇思被師攔胸把住曰除卻摠別同異速道速道余擬對師驀向懸巖一推不顧而去值田頭來扶起當時胸中寶惜廓爾冰消一切淆訛明如指掌返觀從前所得如大海之一滴耳即衝口說偈曰罷罷罷休休休橫眠倒臥在山丘翻身拶碎虛空骨萬象森羅笑點頭次日上方丈呈先師看過袖之復伸手索曰這箇且置將你悟得的呈似老僧看余舉足曰昨日無端被害這腳一夜疼痛不安師呵呵大笑余哭蒼天便出午後呼余至石船曹將從上佛祖因緣衲僧巴鼻重重勘驗余一一對荅如流師復舉德山托缽話詰之曰且道此二老端的在甚麼處余曰德山神出鬼沒巖頭佛口蛇心師曰秪如巖頭密啟其意德山會末後句又作麼生余曰一條拄杖兩人扶師曰為甚果然只得三年活余曰賺殺一船人師曰諦當甚諦當敢保香爐峰未肯點首在余曰任從天下諾忻忻我獨不肯師曰這回吾不汝欺也至秋間委余同無礙兄代理通玄院事師赴嘉禾請余未敢方命山中苦境難以具述越明年往麟湖棲真省覲本師謝院務俾典藏鑰順治己丑九月十六日師出源流拂子囑余住山余固辭曰某甲何人敢當此大任師曰汝但將去已後坐斷天下人舌頭耳乃禮辭本師拽杖渡江意在把茆蓋頭了此餘生備矣涉滁水過壽州寓正陽霍丘諸郡檀越以名剎力致前後一十三請余堅辭不諾乃上陽山訪慧公不意龐摠戎領霍固兩郡檀信齎書疏信儀登山懇請住大別山普濟寺余卻之猶甚慧師曰今觀法緣當熟濟物乘時有祖以來難逃此責和尚豈可執意而謙退乎吾亦率眾相從光揚法席事既難辭勉為應命及進院慧師白槌統眾敦請開法因茲囊錐始露歷遷住持然而或出或處得失窮通皆信乎天緣非強為也山僧始自出家行腳及領眾已來數十年間咬冰嚼蘗甘苦備嘗推己及人以道為慮汝等諸人各有本地風光莫從外覓學吾儕徒喫了許多生受這般說話愧揚家醜明眼人前一場笑具天寒久立珍重大眾歡喜作禮而退
