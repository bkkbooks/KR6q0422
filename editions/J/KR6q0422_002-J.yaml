body:
  text: 嗣法門人果性等編住長安大興善寺語錄師在汝州風穴受請於順治十七年庚子九月十五日進院至山門云跋涉江山萬里程杖頭挑撥水雲深林間識得賓中主把手同歸不二門拈拄杖便行佛殿上香云三覺圓明笑倒雲門乾屎橛一真絕跡拈起風穴竹筋鞭空王殿上頻稽首焦磚打著連底凍遂大展三拜伽藍堂云吾今既到長安唯有一事相托煩君一臂之力驀豎拂子云大家扶這箇祖師堂云東震與西乾一夥白拈賊拈香云吾今活捉來當下俱勦絕便燒方丈據座以拄杖靠禪床云橫按吹毛全提正令艸偃風行十方鎮靜縱擒殺活在臨時從教聖凡來乞命復卓拄杖喝一喝明日眾請開堂師至法座拈請啟云大眾會麼內嚴外肅水乳何分箇裏無私流通正眼如或未委試聽宣讀宣畢師指法座云須彌燈王如來早已向人天眾前漏逗了也新興善忍俊不禁為伊蓋覆一上去也即陞座拈香云此瓣香根蒂生於三韓枝葉茂乎漢國爇向爐中端為祝延今上皇帝聖躬萬歲萬歲萬萬歲恭願金輪永固寶祚彌昌四海皆樂文明萬邦俱陶至化又拈云此瓣香中散為萬事末復合為一理奉為滿朝文武闔國公卿本省在任尊官縉紳文學高遷祿位永佐堯天本山請主在筵緇素伏願直下早悟真空永證當來佛果又拈云此瓣香二十載蜀水吳山一朝相逢兩手分付今番第六回拈出奉為浙江寧波府天童堂上林野先師大和尚爇向爐中用酬法乳之恩維那白椎云法筵龍象眾當觀第一義師云第一義諦無處迴避擬議推尋胡餅裏呷汁畢竟如何眉橫鼻直還有知落處底麼出來道看僧問舊日家風即不問新入長安事如何師云腳跟元不動時經萬里程進云恁麼則人人盡樂堯天日家家齊唱太平歌去也師云一句道著進云未審向上還有事也無師云琉璃殿上無知識僧喝師便打問長安青門燉煌菩薩曾翻此經未審此經作麼生翻譯師云喝囉𠶒那進云且道如何受持師便打僧喝師復打問大地眾生為甚麼與學人鼻孔不同師云切忌以己方人進云如何是楞嚴大定師云動也師乃云大道虛玄當陽顯露真機妙密脫體圓明卷舒應用以無虧出沒隨緣而自在似水投水如空合空觸處現成了無縫罅恁麼則一任孤峰頂上嘯月吟風十字街頭和光混俗動若行雲止猶谷神既無心於彼此豈有像於去來到這裏始可提妙明之心印廓宗說之通途施格外之權衡會偏圓之一致譬如樂蘊奇音指妙則宮商應節人懷覺性智巧則動用冥真然雖如是秪如一句語中具三玄一玄中具三要有權有實有照有用又作麼生道驀拈拄杖云棒頭有眼明如日要識真金火裏看結冬制晚參僧問無眼耳鼻舌身意畢竟是何面目師云庭前寒鵲噪斜陽進云眼光落地時如何師云一畝之地三蛇九鼠問如何是百劫千生一句子師云斷跟艸鞋尖簷蓆帽僧禮拜師便打問有苦有樂途中事如何是歸家消息師云到頭霜夜月任運落前溪僧頓足師云手忙腳亂問二六時中收來放去如何是親切處師云瞎子有人牽跛子有人扶師乃示眾云月紀秦正氣象殊光陰可惜竟何如等閒獨倚南棲立四顧風寒滿太虛堪嗟祖庭秋晚正法凌夷乖違本心人不根道因茲水雲義聚互為主賓宜各慇懃必不相賺雖然如是且作麼生即得豈不見當年慧可大師問初祖達磨大師云諸佛法印可得聞乎磨云諸佛法印匪從人得可云我心未寧乞師安心磨云將心來與汝安可良久云覓心了不可得磨云與汝安心竟只今現前大眾人各有心何必更安但只著衣喫飯坐臥經行取性自由至矣盡矣何也青山綠水仍依舊萬古乾坤日月流結制燦然萬居士請上堂僧問第一義諦誠難迴避囊藏於佛祖機先漏逗於長安鬧市今朝狹路相逢請師重下註腳師云須彌走入鄰虛塵進云迎來送往家常事短限長期過在誰師云天高群象正進云謝師荅話師云海闊百川潮問鐘鼓聲聲談玅法風旛繚繞唱圓音未審是甚麼意旨師云聲色堆頭臥見聞進云眾中還有不聞者麼師云埋沒了也師乃云一句全提該羅法界千差坐斷永絕端倪佛祖窺覷無門人天仰望不及直得聖凡情盡心境俱忘湛寂凝然泯絕無寄到這裏更須知有轉身一路獨步大方左右逢原縱橫變化始得遂驀豎拂子云還會麼萬仞巖前輕撒手大千沙界露全身咸亨禪人領涇陽眾檀越請上堂僧問承師有言差排古佛離窠臼離卻窠臼又向甚麼處去師云大千沙界海中漚一切聖賢如電拂進云莫是他安身立命處麼師云三千里外絕淆訛進云謝師荅話師云不識好惡漢僧便喝師云再喝喝看問火燒龍王殿王在何處安身師云庭前驢子叫問四大各離法身當在何處師云白雲淡淡杲日暉暉僧禮拜云謝師慈悲師云彼此不著便問如何是學人本分事師云秋來一葉落滿地月光輝進云那箇是親切處師云寒山逢拾得撫掌笑呵呵進云箇中關捩子了然無縫罅如何透得師云退後三步問大國長安即不問涇渭清濁事若何師云灞橋餞別悲喜交并進云還有濁而清者麼師云高著眼問生死事大無常迅速如何著落師云深山藏獨虎進云畢竟如何師云淺艸出群蛇師乃云聲前一句截斷眾流信口道來眼橫鼻直入林不動艸入水不動波然而美則美矣仔細檢點將來猶未盡善直饒掇轉驢腮謾道止止不須說掀翻露布休云我法玅難思何故聻瓜田不納履李下莫整冠低頭又蹉過抬眸落二三興善恁麼告報大似紫羅帳裏撒珍珠盡情剖露了也遂以拂子作相云須知就裏深深意莫把封皮作信看晚參師云真空寥廓智體虛玄玅契冥符了無物我所以拈花微笑互相熱謾面壁安心計窮力竭德山入門便棒臨濟入門便喝雖則二俱敏手石火電光徒勞鈍置直饒古今諸佛祖天下老和尚任其千般施設萬種安排若到興善這裏不消一彈指傾便乃高底普應前後無差且道興善有甚長處餐餐粟米飯顆顆是黃金高陵眾居士請上堂僧問達磨面壁即不問斷臂安心意旨如何師云物見主眼卓朔進云正恁麼時痛耶不痛耶師云遠親不如近鄰進云將此深心奉塵剎是則名為報佛恩師云休將庭際柏擬比路傍蒿問風穴家風即不問長安風境事若何師云商山四皓其是一人問棒喝交馳且拈卻請師直指第一義師云不因柳毅傳書信何緣得到洞庭湖問世尊陞座即不問見性成佛請師道師云迷的迷醒的醒進云謝師指出當陽事十方剎海現全身師云老僧不曾道著一字進云情知和尚不肯學人師云不識好惡乃云箇事分明不覆藏何須特地更揄揚慇懃三請重拈出兩耳元來在面傍恁麼見得便見坐臥經行人人樂自天常之性超聲越色處處輝騰本地風光雖則念念攀緣便乃心心永寂明明不昧了了常知且道知一切法而即心自性又作麼生會良久云風吹天際寒雲動雪壓難摧澗底松梁沖霄居士請上堂僧問日中有影因甚鏡裏無痕師云明眼人前三尺暗進云撥艸瞻風貴圖見性即今學人性在甚麼處師云海島金山笑善財問蚯蚓截為兩段未審性在那一段師左右顧視云會麼僧擬議師便打問喜怒哀樂尋常事一念未生時又作麼生師云山青水綠進云懷珠乞丐覓他寶帶露瞻風卻是誰師云雪峰道底問一念未生全體現超凡入聖事若何師云上者不高低者不下問心本無心因境有了境唯心事若何師云眼睛似木𣔻進云本來清淨因甚又不了師云重添搕𢶍乃云丹心一點動合神猷運化千般冥符至理雖則難思正體非情可擬要知莫測靈明即緣而照若洪鐘之在架隨扣擊以成聲大道虛玄故無求而不應正所謂無門無傍四闥皇皇吾不知其名字強名之曰道還會麼金蛇入夢情偏喜龍過禹門燒尾新遂喝一喝下座請斌雅鑑首座立僧天涯禪人領眾居士請上堂僧問盡大地是箇禪堂未審誰是禪堂裏面人師云家住大梁州更覓長安路進云內不放出外不放入且道是甚麼意旨師云鼻孔元來搭上唇問朝日忙忙即不問古澗寒泉事若何師云雲在嶺頭閒不徹問心不是根法不是塵正當恁麼時如何師云見你納敗闕僧喝師云好不識羞乃云拈起須彌鎚子當陽擊碎虛空徹底了無巴鼻縱橫八面玲瓏於此端的始可開鑿人天眼目提持格外風規一任換斗移星與人解粘去縛著著有出身之路頭頭全殺活之機權衡佛祖龜鑑宗乘奪食驅耕本無作意興善僧堂眾雖不多箇箇病在膏肓宜早晚至首座寮請求發藥便可痊安冬至山林知殿領眾居士請上堂僧問大地乾坤即不問狹路相逢事若何師云退身三步進云一年三百六十日返復元來是這漢師云錯認定盤星問碧潭一釣蛟龍上請師相見事若何師便喝進云一聲喝轉現全身師云庭前古柏翠谿底霜雪寒問如何是西來密旨師云昨日有人從東土來進云人人有箇影子因甚踏不著師云為你腳跟不穩乃云乾坤有象化育無私四序遷移玄樞不動截群機於未兆剔突團圞戢冥運於即化混融翬豁那邊這畔無可不可若隱若顯體用全彰更須把住牢關凝然湛寂滴水滴凍佛祖覷捕無門人天難以措足便好放開線道一陽來復匝地普天然雖如是把住則且置放開時又作麼生昨夜面南看北斗梅花早報一枝春喝一喝下座謝監院暨兩廊眾耆舊上堂敘謝畢師復云兩廊義重同監院遠請山僧結勝緣佛事人情皆周備風拋瑞雪喜成團下座解制小參師以拄杖驀擊禪床云拈起千尋兔角杖敲開蓬戶萬重關莫將心意求玄會月落潭空碧玉寒復舉教中道若有一人發真歸元十方虛空悉皆消殞五祖演云若有一人發真歸元十方虛空築著磕著師拈云八面玲瓏須是釋迦老子通身手眼還他五祖禪師雖則同床各夢檢點將來大似徐六擔板興善又且不然若有一人發真歸元饑嗔飽喜閒坐困眠且道與他先德相去多少試檢點看解制上堂僧問把住牢關即不問放開一路事如何師云艸鞋獰似虎拄杖活如龍進云朝來門外千峰雪頃刻陽和當下消師云誰恁麼道師乃云十方雲集善哉良緣表裏雍容當為何事結制共開爐同向無煙火冷灰忽豆爆三千世界簸粵自客歲孟冬暨望以至節屆上元曲指從頭數來看看九十日畢然而慎初護末原始要終首尾一如全無縫罅不參禪道佛法大家共樂無為當場奪取錦標直下心空及第雖然如是且道不結不解向上還有事也無乃豎拂子云天上有星皆拱北人間無水不朝東天童林野奇老和尚十周忌辰超凡知事領眾設供上堂僧問初祖單傳直指人心見性成佛今日興善上堂搖唇鼓舌作麼師云雲生嶺上月落澄潭進云打鼓弄琵琶相逢兩作家秪如不動聲色還辯得麼師云三千里外少知音進云恁麼則秦川八百獅子吼大地龍象盡皈依去也師云𠺗哩嘛哪乃云眾微互一性相融通充塞古今隱顯不二遂驀豎拂子云大眾還委悉麼復作相云箇裏若言有生有滅特地乖張或謂無欠無餘轉見漏逗直饒來不可抑去無所追猶未是向上巴鼻末後牢關何也不起滅盡定而現諸威儀不捨凡夫法而圓諸聖行如向這裏薦得便見天童先師苟或未然下座至真前拈香兩彩一賽上供竟指真云只這闡提老倒法門至惡遺殃不肖之子更毒極情證父攘羊道大誰當辨的機深不自忖量藉沒拈花正脈濟宗一泒綿長電捲星馳兮滔天作略金聲玉振兮擲地風光十年晏寂天童塢四海雄濤潑太倉今者興善幸逢作忌謹具蘋蘩之儀聊申供養不為酬恩報德貴要整復頹綱遂召眾云且道頹綱作麼生整香爇一爐瞻九拜明月清風曉夜涼無際禪人生日請上堂久不陞堂顯正宗藥山之道有遺風淮南禪者勤伸請錦上添花又一重時當季夏末旬之初炎焚爍石燎空蒸鬱流金鼎沸處處槐庭脫巾避暑人人啟戶揮麈尋涼伏火催詩蟬螿聒耳正恁麼時薰風自南來掀翻父母未生前面目畏日從東出照徹見聞知覺根源即此會悟無生觸境隨緣不變所以僧問洞山寒暑到來如何迴避山云何不向無寒暑處迴避僧云如何是無寒暑處山云寒時寒殺闍黎熱時熱殺闍黎召大眾云如向這裏會得觸境不昧性相圓融知恩報恩時時奉重苟或未然三冬向煖火九夏取風涼超凡知事領長安眾居士設齋請上堂師云蟬聲聒噪秋色離披月皎長空香飄丹桂明明生佛已前了了見聞不昧古人從此打失鼻孔可惜而今寂寥山僧到這裏固是分疏不下未識諸人以為何如試檢點看擊拂子下座中元日上堂金鎚影動寶劍光寒逼塞虛空貫通今古是以究一真而莫測極諸法以無餘絕凡聖之名模出語默之徑路性相平等神機活然所以昔有老宿一夏已來并不為師僧說話有僧自歎云我只與麼空過一夏不敢望和尚說佛法得聞正因二字也得老宿聊聞乃云闍黎莫𧬊速若論正因一字也無與麼道了叩齒云適來無端不合與麼道鄰壁有老宿聞乃云好一釜羹被兩顆鼠糞污卻可謂本正則無正這二老宿雖則激濁揚清全體大用仔細看來也是泥裏洗土塊興善一夏已來四方雲集竟不論正因及於有無但只饑來喫飯倦即打眠熱則乘涼隨緣自在雖然秪如一夏至今九十日圓滿明得甚麼邊事突出虛空搏玅翅踏翻滄海起游龍長安大興善寺語錄終雲峨喜禪師住風穴後錄佛成道日上堂離婁有意徒使白浪滔天罔象無心明珠忽然在掌當機覿露本自圓成不落功動豈從外得所以吾佛世尊未離兜率已降皇宮未出母胎度人已畢然雖如是且道正覺山前臘月八夜睹明星豁然大悟又作麼生以拂子劃圓相云雲收萬里乾坤淨一點無私照古今師誕日若愚領眾請上堂僧問鉗鎚高舉即不問鐵樹開花事如何師云地肥茄子大進云瓊枝遶動天關轉綠葉飄時地軸搖師云總不見些兒進云恁麼則和盤托出增光彩普利人天鎮斯時師云放汝三十棒乃云東風煖逐晚雲輕滿目晴光春色明嫩柳妍花紅鬥綠鶯啼燕語話無生所以道欲識佛性義當觀時節因緣時節若至其理自彰於此會得便見父母未生前面目了知當人本命元辰用處聲色純真舉時乾坤獨露物物頭頭顯示衲僧巴鼻塵塵剎剎摠是佛祖家風是以人天共本凡聖同元物我一如心境不二得非天地與我同根萬物與我一體者耶喝一喝卓一卓下座上元解制小參南尋諸友可惜艸鞋絕學高流虛消歲月二途不涉平地喫交打點將來失卻鼻孔且道作麼生得恰好去良久云疑團撲破情何及諸見空時理莫窮南岳五臺從去住桃紅李白笑春風結制晚參塵劫來事只在如今如今不了更經塵劫乃召眾云諸禪德且道作麼生了去良久云還會麼頭頂天腳踏地三千里外絕淆訛眼見色耳聞聲二六時中觀自在處處壁立萬仞頭頭不著纖埃百匝千重貫通今古這裏見得何妨拖泥帶水渾俗和光智照圓明全體獨露雖然秪如雲門大師道觀世音菩薩將錢來買胡餅放下手元來卻是饅頭又作麼生會驀拈拄杖擊禪床云當陽薦取來時路策轉青藜信步歸便下座上堂師云諸方十月十五結制風穴仲冬初一開爐雖則遲早不等也應柴炭俱儲珍重挑灰弄火大家惜取眉鬚贏得一團和氣隨緣日用皆如雲來同甘寂寞清貧快樂有餘坐臥經行自適搬柴運水無拘校之朱門富貴林下道人迥殊遂左右顧眾云且道林下道人有甚麼長處踏翻關捩生涯別不愧堂堂大丈夫解制小參過去諸如來駕馬休征忘功罷業坐治太平隨聲便喝現在諸菩薩戈甲隨身開天闢地血戰沙場便喝未來修學人各負良能皆呈玅手大家依樣畫葫蘆便喝這一隊漢若不遇山僧收伏將來幾乎分疆裂界獨守方隅割截虛空徒以自守然雖如是且道風穴這裏四來禪眾雲水高流三冬告圓一期果滿又作麼生聻驀豎拂子云隴頭春逼梅拋玉溪上風催柳吐金喝一喝下座上元解期上堂師乃云一夥白面禿頭虫問水尋山訪性蹤不在他方求住止卻來風穴伴殘冬荳腐饅頭小米飯粗飽安然笑展容富貴滿爐燒榾柮大家相向煖烘烘一團和氣好消息幾箇知音就裏窮現成公案都不會妄想狐疑瞎用工黑山鬼窟排身入摸著根源兩手空回首忽睹燈明佛放光動地潑天紅乘時要賞元宵節打開布袋任渠儂遂以拂子敲空又擊禪床云璫璫璫鼕鼕端兒下座上堂師乃以拂子作相云若向這裏薦得便見父母未生前面目苟或未然牽枝引蔓再打葛藤去也鐘鼓喧騰群生聳耳主賓酬唱海眾翹勤不落聲色見聞突出當人面目了無生住異滅會取本命元辰澄澄絕照法法圓明即此便見人天共本凡聖同源物我一如心境不二然雖如是且道如何是父母未生前一著萬里風雲寒色重紛紛雨雪戰春光擊拂子知還都寺含白書記圓蒲知客德安守賢侍者同向南方請大藏回上堂拈香祝聖罷敷座云開口成雙橛無言落二三除卻兩頭不居中道如有作家衲僧試出眾道看僧問大藏法寶還有一口氣轉得也無師云問處甚分明進云佛說三藏法元為一切心若無一切心佛法向甚麼處著師云是山皆有寺何處不為家進云大海波心瀑流不息師便打問若論此事眨上眉毛早已錯過如何有三藏十二部師驀豎拄杖云速道進云猶轉第二藏也師云你道第一藏看僧便喝師便打乃云原夫先聖於無量劫中勤苦受盡了悟真常所得祕要法門甚為稀有承無漏根力唱道雞園騰芳鷲嶺四十九年三百餘會鼓舌搖唇橫揮豎抹談說三藏一切修多羅教謂之建法幢立宗旨東流震旦西紹迦維衣被一切眾生洞達群靈心府盡未來際永證菩提然雖如是且道此一段奇特因緣向甚處得來驀豎拂子云要知盡從這裏出何也豈不見道一切諸佛及諸佛法阿耨多羅三藐三菩提皆從此經出左右顧眾云且道此經又從甚處出良久云還會麼如其會得方知日用二六時中著衣喫飯阿屎放尿折旋俯仰俱是諸佛如來法藏三昧海脫或未然向第二義打之遶互相熱瞞去也乃敘事畢復云秪如祖師道三世諸佛是奴婢一大藏教是涕唾又作麼生碧天明月流光遠大地江河入海長卓拄杖下座解制上堂師云時逢上元之際恰遇林下解制昨歲孟冬聚首看看九十日畢光陰迅速何憑於戲如駒過隙諸方浩浩談禪風穴法無滋味搬柴遠上高峰歸來汗流脊背脫粟飯與饅頭一飽噇眠熟睡幸不見神見鬼依舊眉橫鼻直滿肚妄想紛飛尖斗量之不及大似雪點紅爐究取了無巴鼻於此若解承當便是心空及第正漝麼時大家念箇囌嚕囌嚕㗭唎㗭唎以拂子敲禪床云還委悉麼信手擊開不二門從君出入無迴避修建水陸會眾請上堂師云宏機普應正體湛然大用全提隱顯莫測諸佛以此津濟四生而慈心廣被菩薩以此梯航九有而悲智圓明等閑收放縱橫一段真歸掌握神功如乾坤之覆載化育若日月之照臨光含萬象無遺福庇群生有賴由是或現三頭六臂摧伏魔軍或示萬別千差成就正覺難思玅德利物何窮所以道淨法界身本無出沒大悲願力示現受生然雖如是且道法會告圓離苦得樂一句又作麼生驀拈拄杖卓云杖頭雨雪無層數買得春光不用錢上堂雨霽春光艸木榮山花啼鳥話無生覺天風月成何事千載流芳化育清恁麼則物物頭頭包含法界塵塵剎剎普現全身當機指作司南徹底了無向背正所謂淨法界身本無出沒大悲願力示現受生便能巨闢重關單提獨弄作人天之正眼實佛祖之良模照用同時隱顯自在然雖如是且不落夤緣一句作麼生道心地不栽閑艸木滿途荊棘綻蓮華風穴後錄終問荅入室機緣元一問如何是先照後用師云運籌幃幄中決勝千里外進云如何是先用後照師云斫卻月中桂清光倍更多進云如何是照用同時師云金翅劈海直取龍吞進云如何是照用不同時師云華山圖蹟上潘閬倒騎驢僧問如何是清淨法身師云東司籌子念摩訶僧云即是我師云這齷齪鬼僧問事存函蓋合理應箭鋒拄為甚麼天傾東南地傾西北師云差之毫釐失之千里僧云某甲把斷要津去也師云漏逗了也僧禮拜師與當頭一蹋僧問三世諸佛不知有狸奴白牯卻知有請問知有箇甚麼師云吾常於此切僧云某甲為甚麼不知師云汝喫粥了也未僧云喫了師云又道不知晚參師舉僧問雲門學人不起一念時還有過也無門云須彌山意旨如何超越元嶮貫一云撼搖不動養心云撐天拄地參退師即一齊榜出法堂前乃鳴鑼集眾命三僧端容班立上位師便大展坐具將撐禮拜三僧俱驚怖迴避師笑云將謂有險峻之機撐天拄地撼搖不動元來只如此便一齊掌退歸方丈悟元率中隱微三僧掛搭次謝單師問云汝等是身進堂耶是心進堂耶僧俱無語師勵聲正色曰你們主人公也不曾帶得來如何要到我這裏住僧皆悚然班拜一齊胡跪師遂以拂子點云南無佛陀耶南無達摩耶南無僧伽耶復鳴指一下歸方丈凌司李參師云莫便是十如居士麼荅云是師即欄胸搊住云覿面相逢一句速道速道士茫然師云不是不是士云太鹵莽生師云賺我來賺我來良久復問向聞居士留心箇中士云元不曾師云幸值不曾若曾三十棒一棒也不饒士云且道棒頭有眼無眼師云山僧今日不打你在士云要且無下手處師云不知痛癢漢士無語問林我知藏依經解義三世佛冤離經一字即同廢說且不即不離意旨如何林云特來禮拜和尚師云躲跟禪和林便拜師即打出晚參師垂問云適纔達磨大師從少林來被趙州驀面一指走入柏樹子裏去也汝等諸人作麼生救取他出來眾下語不契師云山僧救他去也便一齊掌退歸方丈遂問侍者云大眾救不得汝等試救看玄印近前作聽勢蓮萼云蒼天蒼天慧生云相隨來也師哂之僧求開示師云汝未進山門時頭頭頂住青天今進山門了步步蹋著實地僧云學人不會師云幸汝不會若會山僧即無藏身處問徹維那趙州道昨夜三更文殊普賢相打各與三十棒趁出且道是賞他是罰他徹云賞罰分明師云鄭州出曹門徹纔禮拜師即打出問福侍者明月在天影涵眾水是甚麼消息福云照天照地師云換卻你眼睛福即抽身出方丈師云可憐生問玄印如何是一喝不作一喝用印云放和尚三十棒師云山僧過在甚麼處印云再犯不容師云如何是一喝不作一喝用聻印擬議師云汝適纔道過了也乃直打出問耕畬舉一不得舉二放過一著落在第二放過即不問且道一如何舉畬無語師打出方丈問斷峰如何是賓中主峰從東過西師云如何是主中賓峰又從西過東師云賓主相逢合談何事峰便禮拜師便打出問玄默路逢達道人不將語默對將甚麼對玄便喝師云不是達道人玄云那箇是道師便喝玄便禮拜師直打出問真副寺至道無難唯嫌揀擇為甚鹹底即喜淡底即厭真云少他一點不得師云是甚麼人境界進云嶽邊頓落千山勢海上消歸萬泒聲便禮拜師便打師拈拄杖問均濟云若喚作色塞卻你眼卓云若喚作聲塞卻你耳不落聲色你作麼生道濟便喝師云落聲色了也濟便抽身出方丈師隨後便打問慧泉如何是佛殿裏的如何是佛麻三斤如何是佛杖林山下竹筋鞭此三轉語你道那一語親慧豎拳云與這箇無二無別師云錯慧便喝師云納敗闕漢慧云莫謗他好師打云卻是你謗我問煙樹聲前薦得箭過新羅句後承當刻舟記劍不涉二途你作麼生道樹便禮拜師云躲跟漢樹便喝師即打出師拈拄杖問僧云聞聲悟道見色明心乃豎起云這箇是色那箇是心僧便拜師卓一卓云這箇是聲那箇是道僧喝師云要知除去聲色悟迷始得問慧生有一人在萬丈枯井裏不假寸繩作麼生出得慧便喝師云恁麼在金剛水際埋沒了也慧抽身便出師隨後便棒問虎堂二邊不著中道不居你向甚麼處安身立命堂便禮拜師云無地頭漢堂便喝師便打出僧問如何是奪人不奪境師云臨崖看滸眼特地一場愁僧云如何是奪境不奪人師云夜來風雨妒花落有誰知僧云如何是人境俱奪師云天子一怒伏尸萬里僧云如何是人境俱不奪師云垂衣皇化野老謳歌問光明僧如何是你眼光僧指眼師云如何是你耳光僧指耳師云色身敗壞時光在甚麼處僧便禮拜師打云向這裏照天照地去也問僧近離甚處僧云五臺來師云文殊為你說甚麼法僧云穿衣喫飯師云四大分散時穿喫箇甚麼僧喝師云鼓粥飯氣僧擬議師云裨販菩薩者罪不容誅僧云應無所住而生其心未審是那箇心師云露也僧云在甚處師云沒了也指極禪人領眾同參師問近從那邊過來極云楊山來師云楊山幾時解制極云正月十五師遂舉如意云你從結制以來腳跟下曾蹋著這箇麼極擬議師便打復問參眾適纔錯打這上座入地獄如箭射汝諸人還救得山僧麼眾無語師云既無人救得山僧自救去也以拄杖一齊打出一日僧呈偈師云汝那裏討來底僧云學人自作底師云木人騎馬過西天且道那邊有甚麼事僧云特來請問和尚師以手指云過者邊著僧即從西過東師云會麼僧云不會師云是汝自作底為甚麼不會亂統禪和便打出僧問靈苗瑞艸為甚麼野父愁耘師云好事不如無僧云學人一拳打破虛空向甚麼處藏身師云費力不少旵堂問喚作虛空則觸不喚作虛空則背不觸不背畢竟喚作甚麼師云合取兩片皮空纔擬議師拈棒直打出方丈淨白問大地無寸土學人從甚麼處來師云你即今在甚麼處白便喝師云胡喝亂喝白無語師便打蕭居士求開示師乃敲禪床云會麼士云不會師云若不會山僧更與下箇註腳遂遶禪床一匝士云某甲亦隨和尚一步步去師云獅子咬人韓盧逐塊師與觀察嶪張公茶話次公曰若論箇中事本自現成到這裏吾為甚麼不知師曰不知者即良知也蓋無知而無所不知耳但能一念回光體會源頭明白則道無不在矣故曰一陰一陽之謂道繼之者善也成之者性也仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣公曰吾固不知請師指教師曰檀越貴姓公曰賤姓張師曰居士元來卻知公乃快然肯首師曰三千里外絕淆訛師一日因侍御李公偕內翰松谷張公相訪坐喜公池李曰學生為此事不明今特參承座下請師不倦垂誨師舉起如意曰會麼李曰不會師曰覿面相呈為甚麼不會李曰然隱微之妙理未足以聲色形容也師曰檀越高論略違貴教之本旨李曰何謂耶師曰不見道潛雖伏矣亦孔之昭乎李曰如何即是張曰據吾所見則無處不是師曰是箇甚麼張乃顧李公相笑師曰眼眼相覷此事竟不致於隱諱矣李曰如何下手師即與二公長揖而別湛然禪人請益云諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知乞和尚方便開示師云諸佛智慧者即當人之自性也何遠乎哉此性囫圇無縫罅收放絕行藏正所謂絕是非之端超思議之表得非甚深無量者耶纔作與麼見解則不能入不能知耳所以道無門即解脫之門無路乃道人之路備矣故日昨與公相見時山僧即問大德向來高隱何處公荅曰牛家集吉祥菴山僧曰業何所為公荅曰凡有往來者隨分結緣山僧曰忽然撞著箇銅頭銕額漢來汝作麼生管待公彼時無對就向這裏若透得去可謂功不浪施其或未然更與拈出箇事元來無狀名豈能詮註論疏親頭頭應用無虧缺處處縱橫本現成隱顯翛然從去住高低豁爾絕危平芥中元納須彌在莫謂須彌納芥身拈古舉世尊初生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊後雲門云我當時若見一棒打殺與狗子喫貴圖天太平拈云世尊不解覆藏惹得雲門眼熱舉世尊於靈山會上拈花獨迦葉微笑拈云世尊具拏龍之手迦葉有陷虎之機然雖父為子隱子為父隱要且謾他百萬人天一點不得舉世尊臨涅槃時以手摩胸告眾云汝等善觀吾紫磨金色之身瞻仰取足無令後悔時人天百萬悉皆領悟拈云這老倒一生出乖露醜抵死猶自不知羞當時若遇山僧在會便乃和聲推倒喝散大眾免致累及這一夥墮在聲色裏直至如今出不得舉世尊因外道手握活雀兒問云為死為活世尊以足跨門限云你道我欲出欲入拈云世尊被外道一問至今出入不得外道被世尊一擒便乃收放莫由有人救得這兩箇漢便請下一轉語舉殃崛托缽至一長者家其家婦人正值產難子母未分長者云瞿曇弟子汝為至聖當有何法能免產難殃崛語長者云我乍入道未知此法待我回問世尊卻來相報及返具事白佛佛告殃崛汝速去報言我自從賢聖法來未曾殺生殃崛奉佛語即往告之其婦得聞即免產難拈云殃崛回問世尊往來辛苦婦聞當下分娩母子一雙且道我自賢聖法來未曾殺生又且如何話會水向石邊流出冷風從花裏過來香舉文殊三處過夏因緣尊宿云好一搥又卻放過甘作小乘拈云尊宿與麼道只見錐頭利不見鑿頭方殊不知不因漁父引爭得見波濤舉香嚴初開法溈山令人送書並拄杖至嚴接得便哭蒼天蒼天僧云和尚為甚如此師云秪為春行秋令拈云溈山送拄杖兵隨印轉香嚴接得便哭將逐符行且道春行秋令意旨如何舌頭無骨舉法眼示眾云這裏聚集少時為上座僧堂裏這裏聚集少時為上座三門頭這裏聚集少時為上座寮舍裏為復說上座過別有道理會下有數尊宿對一人云諸佛出世也有這箇方便一人云今日離章義一人云你道他為人在甚麼處一人云點燈等上座多時也一人云甚麼處聚集來拈云法眼老漢只顧掩耳偷鈴殊不知傍觀者哂諸尊宿雖則孟春猶寒仲夏毒熱簡點將來盡是隨摟擻漢且道普濟又作麼生煙雨盜將山色去溪風送出水聲來舉南泉云文殊普賢昨夜三更相打每人與二十棒趁出了也趙州云和尚棒教阿誰喫泉云王老師過在甚麼處州乃作禮拈云南泉問罪依贓趙州據款結案若到風穴門下教他自領出去何故罪不重科舉疏山因院主造塔畢來白山山云汝將多少錢與匠人主云一切在和尚山云為將三文錢與匠人為將兩文錢與匠人為將一文錢與匠人若道得與吾親造塔主無語後舉佀大嶺嶺云還有人道得麼主云未有人道得嶺云汝回舉佀疏山道大嶺云若將三文錢與匠人和尚今生決定不得塔若將兩文錢與匠人和尚與匠人共垂一隻手若將一文錢與匠人累他匠人眉鬚墮落主回舉佀疏山山具威儀望大嶺禮拜嘆云大嶺古佛放光射至此間雖然如是也是臘月蓮花大嶺後聞此語云我恁麼道也是龜毛長數丈拈云院主雖與造塔勞而無功疏山不解還錢徒為算數當時若是風穴待問汝將多少錢與匠人向他道分文不直不唯絕累大嶺不了抑免疏山尸骸遍地然雖如是且臘月蓮花龜毛長數丈又作麼生蝸牛頭角兩丫叉舉馬祖因僧問離四句絕百非請師直指西來意祖云我今日勞倦不能為汝說問取智藏去公案拈云諸方盡謂這僧錯過馬師父子枉費自家艸鞋殊不知馬師父子鼻孔俱落在這僧手裏具眼者試辨看舉趙州因僧問皓月當空時如何州云猶是階下漢僧云請師接上階州云月落後相見拈云透生死關方能高超物表秉殺活劍始可接物利生這僧若不遇趙州一向扶籬摸壁帶鎖擔枷然雖如是且道月落後又作麼生相見水歸大海波濤淨雲到蒼梧氣象閒舉溈山坐次仰山從方丈前過山云若是百丈先師子須喫痛棒始得仰云今日事作麼生山云合取兩片皮有分仰云此恩難報山云非子不才老僧年邁仰云今日親見百丈師翁山云向甚麼句中見先師仰云不道見只是無別山云始終作家拈云溈仰父子可謂動絃別曲葉落知秋線去絲來機輪活脫當此之際且作麼生是他得見百丈師翁處野色更無山隔斷天光直與水相通舉長生問靈雲混沌未分時如何靈云露柱懷胎生云分後如何靈云如片雲點太清生云未審太清還受點也無靈不對生云恁麼則含生不來也靈亦不對生云直得純清絕點時如何靈曰猶是真常流注生云如何是真常流注靈曰佀鏡常明生云未審向上還有事也無靈曰有生云如何是向上事靈曰打破鏡來與子相見拈云長生玄關深鎖靈雲八字打開直得古今洞明纖塵不隔然雖如此猶未是向上巴鼻在且作麼生是向上巴鼻路遠夜長休把火大家吹滅暗中行舉南泉示眾云法身還具四大不有人道得與他一腰褌道吾云性地非空空非性地此是地大三大亦然泉不違前語與褌一腰拈云南泉雖則不食前言要且不是好心道吾贏得一腰褌竟不知著賊風穴當時若在但道請和尚歸方丈喫茶不唯契他南泉亦免互相鈍置舉五祖因僧問一大藏教是箇切腳未審切箇甚麼字祖云缽羅孃拈云這僧切腳頗真其奈五祖還字未的卻把音和之門切作麻韻不定風穴又且不然一大藏教是箇切腳未審切箇甚麼字劈脊便棒何謂如此豈不見道有聲韻中直取見形篇內活拏舉國師三喚侍者三應師云將謂吾辜負汝卻是汝辜負吾拈云國師三喚竹影掃階塵不動侍者三應月穿潭底水無痕且道負汝負吾又作麼生啼得血流無用處不如緘口過殘春舉天皇因龍潭問某甲自來不蒙指示心要皇云自汝到來未嘗不指示汝心要潭云何處指示皇云汝擎茶來吾與汝接汝行食來吾與汝受汝和南時吾便低頭何處不指示汝心要潭佇思間皇云直下便見擬思即差潭當下有省復問如何保任皇云任性逍遙隨緣自在但盡凡情別無聖解拈云天皇雖有打破虛空底鉗鎚且無補綴陰陽底針線只今若問風穴如何保任即喚云闍黎待伊應喏向道歸堂喫茶去舉芙蓉楷侍投子遊園子度拄杖與楷楷便隨行子云理合與麼楷云與和尚提鞋挈杖不為分外子云有同行在楷云那一人不受教子休去至晚問楷早來說話未盡在楷云請和尚舉子云卯生日戌生月楷即點燈來子云汝上來下去總不徒然楷云在和尚左右理合如此子云奴兒婢子誰家屋裏無楷云和尚年尊缺他不可子云得與麼殷勤楷云報恩有分拈云明投暗合玉轉珠回賓主和同不無洞達然則曹洞門下足可觀光若據臨濟兒孫麤硬拄杖未肯放過在何也那邊不住空王殿爭肯耘田向日輪舉神藏示眾云知而無知不是無知而說無知南泉云與麼依師道始得一半黃檗運云不是南泉駁他要圓前話拈云潑油救火渾閒事雪上加霜愁殺人舉藥山坐次有僧問云兀兀地思量箇甚麼山云思量箇不思量底僧云不思量底如何思量山云非思量拈云大小藥山被這僧拶著直至如今轉身不得舉九峰希廣禪師首謁雲蓋智乃問興化打克賓意旨如何智下禪床展兩手吐舌示之希打一坐具智云此是風力所轉又問石霜琳琳云你意作麼生希又打一坐具琳云好一坐具祗是不知落處又問真淨淨云你意作麼生希又打一坐具淨云他打你也打希於言下大悟拈云九峰雖則三度令行到底不知坐具落處真淨道他打你也打正是金鋀莫辨玉石難分且道即今還有辨得出底麼若辨得出生陷無間地獄其或未然鶴有九皋難翥翼馬無千里謾追風舉西院思明禪師問保壽云蹋破化城來時如何壽云不斬死漢院云斬壽便打院連道十聲斬壽連聲打十棒趁出復云適來這僧將赤肉抵他乾棒有甚麼死急次有僧云某甲啟和尚問話底僧在大覺處來兩人同參在這裏見解總與麼恐已後委悉和尚法道須是趁出二人若不趁出已後難得人承嗣壽便趁出陳白這僧拈云西院縱然蹋破化城要且腳跟未得點地保壽雖則不斬死漢早已血濺梵天只如趁出陳白這僧意作麼生韜略雙全多意氣安南塞北一齊收舉翠微無學禪師因龍牙問自到和尚法席每每上堂不蒙一法示誨意在於何微云嫌箇甚麼牙後又問洞山山云爭怪得老僧後又問法眼眼云祖師來也雪竇云兩箇漢被這僧穿卻唯有法眼與他同參拈云雪竇老漢秪具一隻眼只知兩箇漢被這僧穿卻殊不知這僧被法眼穿卻舉大慧拈竹篦問僧云喚作竹篦則觸不喚作竹篦則背不得有語不得無語速道速道僧云甕裏怕走卻鱉那慧下禪床擒住云此是誰語速道僧云實不敢相謾是竹菴和尚教某甲恁麼道慧連打數棒云分明舉佀諸方拈云大慧奮獅子之威獰驗破群狐肝膽這僧不合傳言送語甘代別人喫棒棒雖喫了還知大慧老人為人處也未舉雙峰禪師示眾云進一步即迷理退一步即失事饒你一向兀然立又同無情時有僧問如何得不同無情峰云動轉施為僧云如何得不迷理失事去峰云進一步退一步僧便作禮峰云向來有人與麼會老僧不肯伊僧云請師直指峰便打出拈云雙峰與麼施設可謂八面玲瓏十方自在秪如末後一機還有知他落處底麼從前汗馬無人識只要重論蓋代功舉本仁示眾云尋常不欲向聲前色後鼓弄人家男女何故且聲不是聲色不是色時有僧問如何是聲不是聲仁云喚作色得麼僧云如何是色不是色仁云喚作聲得麼僧作禮仁云且道為汝說荅汝話若人辨得有箇入處拈云大小本仁只有湛水之波且無滔天之浪如何是聲不是聲枯木鳴寒鳥空山啼夜猿如何是色不是色紅入桃花嫩青歸柳陌新若人向這裏辨得與你一緉艸鞋舉汾陽無業禪師云若有一絲毫頭凡聖情念未盡入驢胎馬腹裏去白雲端云直饒一絲毫頭凡聖情念頓盡亦未免入驢胎馬腹裏去瞎漢但恁麼會拈云識得汾陽坐殺闍黎識得白雲走殺闍黎直饒你縱橫十字圓轉一機總是驢胎馬腹裏漢畢竟如何閒把一枝無孔笛夜深吹過汨羅彎舉風穴沼在郢州衙內陞座云祖師心印狀似銕牛之機去即印住住即印破只如不去不住印即是不印即是時有盧陂長老出問某甲有銕牛之機請師不搭印穴云慣釣鯨鯢沉巨浸卻嗟蛙步𩥇泥沙陂佇恩穴喝云長老何不進語陂擬議穴打一拂子云還記得話頭麼試舉看陂擬開口穴又打一拂子牧主云佛法元來與王法一般穴云太守見箇甚麼道理牧主云當斷不斷返招其亂穴便下座拈云沼祖雖是高提祖印縱奪當機簡點將來翻成鈍置當時待伊問某甲有銕牛之機請師不搭印便與連棒打出不唯不被牧主看破亦免千古之下遭人簡點舉深明二上座一日同行見捕魚忽一魚跳出網深云俊哉一似箇衲僧相似明云何似當初不入網好深云明兄猶欠悟在明行三十里方省拈云有般漢商量道這二上座一人附物顯理一人色前不物可謂同時應用各得其宜與麼見解苦哉苦哉殊不知正似棋逢敵手琴遇知音既然如是因甚三十里後方省還會麼依俙似曲纔堪聽又被風吹別調中舉青原思問六祖當何所務即不落階級祖云汝曾作甚麼來思云聖諦亦不為祖云落何階級思云聖諦尚不為何階級之有祖深契之拈云這二老漢前不搆村後不迭店舉夾山參船子子問垂絲千尺意在深潭離鉤三寸子何不道山擬開口子便打山落水纔出又打云道道山擬開口子又打山豁然大悟乃點頭三下子云竿頭絲線從君弄不犯清波意自殊山遂進問拋綸擲釣師意如何子云絲懸淥水浮定有無之意速道速道山云語帶玄而無路舌頭談而不談子云釣盡江波金鱗始遇山乃掩耳子云如是如是拈云劈口一橈全機喪盡點頭三下有理難伸還知藏身處沒蹤跡沒蹤跡處莫藏身底麼乃靠拄杖云月天雲度山頭影江國風生水面寒舉凌行婆問浮杯盡力道不得底句分付阿誰杯云浮杯無剩語婆云未到浮杯不妨疑著杯云更有長處不妨拈出婆斂手哭云蒼天中更添怨苦杯無語婆云語不知偏正理不識倒邪為人則禍生後有僧舉似南泉泉云苦哉浮杯被這老婆摧折一上婆聞得笑云王老師猶少機關在時有幽州澄一禪客詣婆乃問南泉為甚少機關婆哭云可悲可痛澄一罔措婆云會麼一合掌而立婆云跂死禪和如麻似粟後澄一舉似趙州州云我若見這臭老婆問教伊口啞一云未審和尚作麼生問伊州便打一云為甚卻打某甲州云似這般跂死禪和不打更待何時婆聞卻云趙州合喫婆手中棒州聞得笑云可悲可痛婆聞乃嘆云趙州眼光爍破四天下州聞得令人去問云如何是趙州眼婆乃豎起拳僧回舉似趙州州乃有頌與婆云當機覿面提覿面當機疾報爾凌行婆哭聲何得失婆有頌荅云哭聲師已曉已曉復誰知當時摩竭令幾喪目前機拈云浮杯無語可謂頭正尾正凌婆不知天色徒怪風雲南泉父子雖則善識機宜正眼看來未出老婆見解風穴或有人問盡力道不得底句分付阿誰對曰待我驢年有箇悟處即向你道管取聞者盡皆翹望舉都尉李文和公公主貴降命三大宗師同日陞座末後葉縣橫拄杖就膝上拗作兩截便下座尉云作家宗師手段終別縣云都尉也不得無過拈云葉縣做處迥別都尉見得分明未審過在甚處若人辨得出罪犯彌天其或未然也不得無過舉雪峰示眾云望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也保福問鵝湖僧堂前相見且置望州亭烏石嶺甚麼處相見鵝湖驟步歸方丈保福入禪堂拈云這一夥賣私鹽漢有甚憑據舉南院因僧問從上古人見不盡處師還見也無院云握髮吐餐人不顧滿朝盡道好周公僧向口上打院云道者太煞瞎僧云有恁麼瞎老漢恁麼道院便打拈云這僧險似天關南院平如鏡面若據從上古人見不盡處二人俱未敢覷著何故聻瞎舉芭蕉示眾云你有拄杖子我與你拄杖子你無拄杖子我奪卻拄杖子拈云用盡自己心笑破他人口你有拄杖子我與你拄杖子畫蛇添足你無拄杖子我奪卻你拄杖子龜背刮毛既然如此且作麼生是你拄杖子咄舉雲門上堂大眾集定是大過患仔細簡點眾無對門代云不用別人拈云抱薪救火徒自燒身舉龐居士問馬大師不與萬法為侶者是甚麼人大師云待汝一口吸盡西江水即向汝道拈云龐公無處合伴馬祖覓箇還稀直至如今孤凄冷淡風穴則不然不與萬法為侶者是甚麼人泣露千般艸吟風一樣松向這裏見得便見古人落處脫或不然待汝一口吸盡西江水即向你道舉昔有一僧親近一老宿甚勤宿每見來即揮手曰未在未在且去如是經久其僧中夜思惟曰並不蒙一言開示秪管道我未在教我怎生奈何思量來思量去忽然省得歡喜無量至明日上去見老宿宿見來便點頭曰是也是也拈云這老宿只有順水推舟之作且無抽釘拔楔之能我此間若有來者即點頭云是也是也待伊忽然省得歡喜時便揮手曰未在未在且道與古人是同是別舉玄沙上堂眾集遂將拄杖一時趁下卻回向侍者道我今作得一解險入地獄如箭射侍者云喜得和尚再復人身翠巖芝云大小玄沙前不搆村後不迭店且作麼生道得出身之路拈云鉤在不疑之地舉盤山垂語云若言即心是佛今時未入玄微若言非心非佛亦未是指宗極則拈云大小盤山只知收拾鼻孔不覺裂破舌頭舉雲門示眾云天地之內宇宙之間中有一寶秪在形山拈燈籠向佛殿裏將三門來燈籠上作麼生自代云逐物意移拈云截得他人腳跟失卻自己鼻孔舉乾峰示眾云舉一不得舉二放過一著落在第二雲門出眾曰昨日有人從天台來卻往徑山去拈云乾峰頭上是天雲門腳下是地雖則函蓋乾坤各與三十楖栗忽有箇傍不甘底出來道和尚恁麼盲加瞎棒亦好與三十楖栗知我罪我我何辭焉舉雲門一日舉有為無三世無為有三世有為是斷滅法何處得三世無為有三世不是守寂滅處法拈云動則埋根千丈不動則當處生苗咄是何言歟舉乾峰因僧問十方薄伽梵一路涅槃門未審路頭在甚麼處峰以拄杖劃一劃云在這裏僧又問雲門門拈起扇子云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼拈云乾峰曲不藏直雲門直不藏曲然而曲直不同大都路頭不別忽有人問如何是不別底路頭但向道漆桶參堂去舉雲門一日行次以拄杖打露柱一下云甚麼處來自云西天來復云來這裏作甚麼自云說佛法乃喝云欺我唐土人又以拄杖子打一下便行拈云笑殺傍觀舉太史黃庭堅一日參黃龍心禪師求入道捷徑心云秪如仲尼道二三子以我為隱乎吾無隱乎爾太史尋常如何理論史擬對心云不是不是史迷悶不已一日侍心山行桂花盛開心云聞桂花香麼史云聞心云吾無隱乎爾史遂有省拈云黃太史好箇孃生鼻孔卻被黃龍和尚高高挂在木樨樹上直至而今風吹日炙舉法華經云大通智勝佛十劫坐道場佛法不現前不得成佛道拈云幸自無瘡勿傷之也舉南泉翫月次趙州指月云幾時得似恁麼泉云王老師二十年前曾恁麼來州云只今作麼生泉便歸方丈拈云昭昭而溢目騰輝何假神通之顯現晃晃而無塵不透豈勞玅辨之敷揚翫時既不容取次觀光鑑處那許安排著彩且風流公子翫賞佳人到此又作麼生著眼絃絕聲消人去後高山流水至如今舉三聖然禪師參德山纔展坐具山云不用展炊單我這裏無殘羹餿飯然云賴遇無設有亦無著處山便打然接住推倒向禪床上山大笑然哭蒼天出去拈云苟子之不欲雖賞之不竊舉茱萸因趙州上法堂東覷西覷萸乃問作甚麼州云探水萸云我這裏一滴也無探箇甚麼州遂將拄杖靠壁而出拈云趙州雖解探水要且不識淺深茱萸一滴也無早已沒頭浸卻還知趙州靠拄杖而出麼唵㗭唎囌囉薩訶舉雲門示眾云你若實未得箇入處三世諸佛在你腳跟下一大藏教在你舌頭上且向葛藤處會取圓悟云崇寧土上加泥敢道直得溈山水牯觸殺東海鯉魚陝府銕牛吞卻嘉州大象拈云俊哉若非崇寧放出溈山水牯趁起陝府銕牛蹋碎雲門葛藤天下衲僧幾被繫絆到驢年未有自由分舉曹山云莫行心處路不挂本來衣何須正恁麼切忌未生時拈云當門切莫栽荊棘後代兒孫惹著衣舉普化居常入市振鐸云明頭來明頭打暗頭來暗頭打四方八而來旋風打虛空來連架打一日臨濟令僧捉住云總不恁麼來時如何化托開云來日大悲院裏有齋僧回舉侶濟濟云我從來疑著這漢拈云普化好箇無孔銕鎚被臨濟一拶百雜碎是汝諸人還知落處麼舉修山主云是柱不見柱非柱不見柱是非已去了是非裏薦取拈云風穴當時若見便呵呵大笑管使修山主羞慚無地頌古世尊摩胸告眾霜嚴歲盡冷沉沉萬象無聲臥凍雲總使春光能入目看來何侶舊年春舉雲門上堂大眾集定是大過患仔細簡點眾無對自代云不用別人可憐罪重覓根源眼底生涯望得穿回首夕陽何處是捶胸還自哭蒼天舉九峰因僧問十二時中如何合道峰曰無心合道僧曰畢竟如何峰曰土上覓泥由自可波中求水實堪悲青山如畫勢參差看到黃昏睡已遲一夜西風吹古木天明滿地拾柴枝舉盤山示眾三界無法何處求心四大本空佛依何住璿璣不動寂爾無言覿面相呈更無餘事珍重江上漁翁把釣垂生涯隨處不須歸夜深月下眠清夢風壓輕雲貼水飛女子出定一亙長空雨霽時綠楊深處臥閒貍數聲啼鳥驚回夢流水青山信不移善財採藥信手拈來藥味全不同甘艸與黃連文殊用處多靈驗一劑沾唇百病痊二祖斷臂好肉無瘡莫去剜少林立雪也無端直饒覓得安心法徒使孃生一臂殘臨濟入門便喝不打諸方口鼓